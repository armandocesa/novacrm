<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaCRM</title>
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f3f4f7; --surface-3:#eceef2;
    --border:#e5e7eb; --border-2:#eef0f3;
    --text:#101317; --text-2:#5b6472; --text-3:#9097a3;
    --primary:#4f46e5; --primary-2:#6366f1; --primary-soft:#eef0fe; --primary-border:#dcdcff;
    --green:#15a34a; --green-soft:#e8f6ee; --amber:#d97706; --amber-soft:#fdf1e3;
    --red:#dc2626; --red-soft:#fdeaea; --teal:#0d9488; --teal-soft:#e3f4f2; --purple:#7c3aed; --purple-soft:#f1eafe;
    --shadow-sm:0 1px 2px rgba(16,19,23,.05);
    --shadow:0 2px 8px rgba(16,19,23,.06),0 1px 2px rgba(16,19,23,.04);
    --shadow-lg:0 12px 32px rgba(16,19,23,.12);
    --r:10px; --r-lg:14px;
  }
  [data-theme="dark"]{
    --bg:#0d0f14; --surface:#13161d; --surface-2:#1a1e27; --surface-3:#222732;
    --border:#252a35; --border-2:#1e222c;
    --text:#eceef3; --text-2:#9aa2b1; --text-3:#6a7281;
    --primary:#6366f1; --primary-2:#818cf8; --primary-soft:#1c1f3a; --primary-border:#2e3358;
    --green:#34d399; --green-soft:#11261d; --amber:#fbbf24; --amber-soft:#2a2113;
    --red:#f87171; --red-soft:#2a1517; --teal:#2dd4bf; --teal-soft:#0f2522; --purple:#a78bfa; --purple-soft:#1e1733;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 2px 10px rgba(0,0,0,.35);
    --shadow-lg:0 16px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px;
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  svg{display:block}
  .ico{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh}

  /* ===== SIDEBAR ===== */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 18px 14px}
  .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-sm)}
  .logo svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2}
  .brand b{font-size:16px;font-weight:700;letter-spacing:-.02em}
  .org{margin:2px 12px 10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.15s}
  .org:hover{background:var(--surface-3)}
  .org small{color:var(--text-3);font-size:11px;font-weight:500}
  .org .row{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
  .org b{font-size:13.5px;font-weight:650}
  .org .row svg{width:15px;height:15px;color:var(--text-3)}
  .navwrap{flex:1;overflow-y:auto;padding:6px 12px 12px}
  .navwrap::-webkit-scrollbar{width:6px}
  .navwrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
  .navgroup{color:var(--text-3);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:14px 10px 6px;font-weight:650}
  .navitem{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;color:var(--text-2);cursor:pointer;font-weight:550;transition:.13s;margin-bottom:1px;position:relative}
  .navitem:hover{background:var(--surface-2);color:var(--text)}
  .navitem.active{background:var(--primary-soft);color:var(--primary)}
  .navitem.active .ico{color:var(--primary)}
  .navitem .ico{width:17px;height:17px;color:var(--text-3)}
  .navitem:hover .ico{color:var(--text-2)}
  .navitem .lbl{flex:1}
  .navitem .badge{background:var(--primary);color:#fff;border-radius:20px;font-size:10.5px;padding:1px 7px;font-weight:700}
  .navitem .badge.amb{background:var(--amber)}
  .side-foot{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--primary));display:grid;place-items:center;font-weight:700;color:#fff;font-size:12px}
  .side-foot .nm{font-weight:600;font-size:13px;line-height:1.3}
  .side-foot .rl{color:var(--text-3);font-size:11px}

  /* ===== MAIN ===== */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:14px;padding:13px 26px;border-bottom:1px solid var(--border);background:var(--surface)}
  .pagehead .pt{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .pagehead .ps{font-size:12.5px;color:var(--text-3);margin-top:1px}
  .spacer{flex:1}
  .search{width:240px;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text-3);transition:.15s}
  .search:focus-within{border-color:var(--primary-border);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft)}
  .search svg{width:16px;height:16px}
  .search input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:13px;font-family:inherit}
  .iconbtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);display:grid;place-items:center;cursor:pointer;color:var(--text-2);transition:.15s}
  .iconbtn:hover{background:var(--surface-3);color:var(--text)}
  .iconbtn svg{width:17px;height:17px}
  .envtog{display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text-2);transition:.15s}
  .envtog:hover{background:var(--surface-3)}
  .envtog .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .envtog.sbx{border-color:var(--amber);color:var(--amber)}
  .envtog.sbx .d{background:var(--amber)}
  .btn{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:9px;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:7px;font-family:inherit;transition:.15s;box-shadow:var(--shadow-sm)}
  .btn:hover{background:var(--primary-2)}
  .btn svg{width:16px;height:16px;stroke-width:2.2}
  .btn.ghost{background:var(--surface);border:1px solid var(--border);color:var(--text);box-shadow:none}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .sbxbanner{background:var(--amber-soft);border-bottom:1px solid var(--amber);color:var(--amber);padding:8px 26px;font-size:12.5px;font-weight:600;display:none;align-items:center;gap:8px}
  .sbxbanner.show{display:flex}
  .sbxbanner svg{width:15px;height:15px}
  .content{padding:24px 26px;overflow-y:auto;flex:1}
  .content::-webkit-scrollbar{width:9px}
  .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .view{animation:fade .28s ease}

  /* ===== COMPONENTS ===== */
  .callout{background:var(--primary-soft);border:1px solid var(--primary-border);border-radius:var(--r);padding:12px 14px;margin-bottom:20px;color:var(--text-2);font-size:13px;display:flex;gap:11px;line-height:1.55}
  .callout svg{width:17px;height:17px;color:var(--primary);flex-shrink:0;margin-top:1px}
  .callout b{color:var(--text)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm)}
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
  .grid2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .kpi small{color:var(--text-3);font-size:12px;font-weight:550;display:flex;align-items:center;gap:7px}
  .kpi small svg{width:15px;height:15px;color:var(--text-3)}
  .kpi .v{font-size:27px;font-weight:750;margin:10px 0 5px;letter-spacing:-.02em}
  .kpi .d{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
  .kpi .d svg{width:13px;height:13px}
  .up{color:var(--green)} .down{color:var(--red)}
  .card h3{font-size:14px;font-weight:650;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .card h3 a{color:var(--primary);font-size:12.5px;cursor:pointer;font-weight:600}

  .bars{display:flex;align-items:flex-end;gap:13px;height:168px;padding-top:10px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;height:100%;justify-content:flex-end}
  .bar .col{width:100%;background:linear-gradient(180deg,var(--primary-2),var(--primary));border-radius:6px 6px 0 0;transition:.4s;min-height:4px}
  .bar:hover .col{filter:brightness(1.1)}
  .bar span{color:var(--text-3);font-size:11px;font-weight:500}
  .donut{display:flex;align-items:center;gap:22px}
  .leg{display:flex;flex-direction:column;gap:10px;font-size:13px}
  .leg div{display:flex;align-items:center;gap:9px;color:var(--text-2)}
  .leg i{width:10px;height:10px;border-radius:3px;display:inline-block}

  .actlist{display:flex;flex-direction:column}
  .actrow{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:9px;border-bottom:1px solid var(--border-2)}
  .actrow:last-child{border-bottom:none}
  .actrow:hover{background:var(--surface-2)}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .actrow .t{font-weight:600;font-size:13.5px}
  .actrow .s{color:var(--text-3);font-size:12px;margin-top:1px}
  .actrow time{margin-left:auto;color:var(--text-3);font-size:12px;white-space:nowrap}

  .tablecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:12px 16px;border-bottom:1px solid var(--border);font-weight:650;background:var(--surface-2)}
  td{padding:13px 16px;border-bottom:1px solid var(--border-2);font-size:13.5px}
  tbody tr{cursor:pointer;transition:.12s}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:7px;font-size:11.5px;font-weight:600}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .pill.lead{background:var(--amber-soft);color:var(--amber)}
  .pill.qual{background:var(--teal-soft);color:var(--teal)}
  .pill.cli{background:var(--green-soft);color:var(--green)}
  .pill.cold{background:var(--surface-3);color:var(--text-2)}
  .pill.red{background:var(--red-soft);color:var(--red)}
  .pill.amb{background:var(--amber-soft);color:var(--amber)}
  .pill.grn{background:var(--green-soft);color:var(--green)}
  .pill.blu{background:var(--primary-soft);color:var(--primary)}
  .pill.pur{background:var(--purple-soft);color:var(--purple)}
  .pill.plain::before{display:none}
  .uava{display:flex;align-items:center;gap:10px}
  .miniav{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:650;color:#fff;font-size:11.5px;flex-shrink:0}

  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;align-items:start}
  .kcol{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px;min-height:220px}
  .kcol h4{font-size:12.5px;font-weight:650;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .kcol h4 .cnt{color:var(--text-3);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:0 7px;font-size:11px}
  .ksum{color:var(--text-3);font-size:12px;font-weight:600;margin-bottom:11px}
  .deal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;cursor:grab;box-shadow:var(--shadow-sm);transition:.15s}
  .deal:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .deal:active{cursor:grabbing}
  .deal.drag{opacity:.4}
  .deal .dn{font-weight:600;margin-bottom:4px;font-size:13px}
  .deal .dc{color:var(--text-3);font-size:12px;margin-bottom:10px}
  .deal .dv{font-weight:750;color:var(--text)}
  .deal .dm{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .kcol.over{outline:2px dashed var(--primary);outline-offset:-2px;background:var(--primary-soft)}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .tab{padding:7px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--text-2);transition:.13s}
  .tab:hover{background:var(--surface-2)}
  .tab.active{background:var(--primary);border-color:var(--primary);color:#fff}

  .mailwrap{display:grid;grid-template-columns:340px 1fr;gap:16px;height:calc(100vh - 220px)}
  .maillist,.chatlist{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;box-shadow:var(--shadow-sm)}
  .mailitem{padding:14px 16px;border-bottom:1px solid var(--border-2);cursor:pointer;transition:.12s}
  .mailitem:hover{background:var(--surface-2)}
  .mailitem.active{background:var(--primary-soft)}
  .mailitem .mh{display:flex;justify-content:space-between;margin-bottom:4px}
  .mailitem .mfrom{font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .mailitem .mtime{color:var(--text-3);font-size:11px}
  .mailitem .msub{font-weight:600;font-size:13px;margin-bottom:3px}
  .mailitem .mprev{color:var(--text-3);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mailitem.unread .mfrom::before{content:"";display:inline-block;width:7px;height:7px;background:var(--primary);border-radius:50%}
  .mailview{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;overflow-y:auto;box-shadow:var(--shadow-sm)}
  .linkbox{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:16px 0;display:flex;align-items:center;gap:12px}
  .linkbox .lt{font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-weight:650;margin-bottom:2px}
  .linkbox svg{width:18px;height:18px;color:var(--primary)}
  .mailbody{line-height:1.7;color:var(--text-2);margin-top:18px}
  .mailbody p{margin-bottom:12px}
  .ai-box{background:var(--purple-soft);border:1px solid color-mix(in srgb,var(--purple) 30%,transparent);border-radius:10px;padding:14px 16px;margin:16px 0}
  .ai-box .ai-h{display:flex;align-items:center;gap:8px;font-weight:650;color:var(--purple);margin-bottom:8px;font-size:13px}
  .ai-box .ai-h svg{width:16px;height:16px}
  .ai-box ul{margin:0;padding-left:18px;line-height:1.7;color:var(--text-2);font-size:13px}

  .chatwrap{display:grid;grid-template-columns:300px 1fr;gap:16px;height:calc(100vh - 220px)}
  .chatconv{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  .chathead{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
  .chatbody{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:11px;background:var(--surface-2)}
  .bub{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;box-shadow:var(--shadow-sm)}
  .bub.in{background:var(--surface);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
  .bub.out{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .bub .bt{font-size:10px;opacity:.6;margin-top:4px}
  .chatinput{padding:13px;border-top:1px solid var(--border);display:flex;gap:10px}
  .chatinput input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);outline:none;font-family:inherit;font-size:13px}

  .formprev{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:26px;max-width:430px}
  .formprev h4{font-size:18px;margin-bottom:4px;letter-spacing:-.02em}
  .formprev p{color:var(--text-3);font-size:13px;margin-bottom:18px}
  .ff{margin-bottom:14px}
  .ff label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text-2)}
  .ff input,.ff select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit}
  .formprev .sub{background:var(--primary);color:#fff;border:none;width:100%;padding:12px;border-radius:8px;font-weight:650;cursor:pointer;font-family:inherit;font-size:13px}
  .code{background:var(--surface-3);border:1px solid var(--border);border-radius:9px;padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--text-2);white-space:pre-wrap;line-height:1.6}

  .bp{display:flex;align-items:center;gap:0;overflow-x:auto;padding:10px 0 4px}
  .bp-step{flex-shrink:0;text-align:center;min-width:90px}
  .bp-circle{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-weight:700;margin:0 auto 9px;border:2px solid var(--border);background:var(--surface);color:var(--text-3)}
  .bp-circle.done{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .bp-circle.done svg{width:20px;height:20px;stroke-width:2.5}
  .bp-circle.cur{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .bp-step .bl{font-size:12px;font-weight:600}
  .bp-step .bs{font-size:11px;color:var(--text-3)}
  .bp-arrow{flex:1;min-width:30px;height:2px;background:var(--border);margin:0 4px 32px}
  .trans{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:16px;display:flex;align-items:center;gap:14px}
  .trans .ti{width:34px;height:34px;border-radius:9px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;flex-shrink:0}

  .wf{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
  .wf-h{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .wf-h .wi{width:30px;height:30px;border-radius:8px;background:var(--amber-soft);color:var(--amber);display:grid;place-items:center}
  .wf-h b{font-weight:650}
  .wf-flow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .wf-node{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12.5px}
  .wf-node b{display:block;font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;font-weight:650}
  .wf-arrow{color:var(--text-3)}
  .toggle{width:38px;height:22px;background:var(--green);border-radius:20px;position:relative;cursor:pointer;flex-shrink:0;transition:.2s}
  .toggle::after{content:"";position:absolute;top:2px;left:18px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:var(--shadow-sm)}
  .toggle.off{background:var(--border)}
  .toggle.off::after{left:2px}
  .ml-auto{margin-left:auto}

  .cal{display:grid;grid-template-columns:56px repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .cal .ch{background:var(--surface);padding:11px;text-align:center;font-size:12px;font-weight:650}
  .cal .ct{background:var(--surface);padding:8px;font-size:11px;color:var(--text-3);text-align:right}
  .cal .cc{background:var(--surface);min-height:56px;padding:4px}
  .ev{border-radius:6px;padding:5px 8px;font-size:11px;font-weight:600;margin-bottom:3px;color:#fff;cursor:pointer}

  .seqstep{display:flex;gap:14px}
  .seqstep .sl{display:flex;flex-direction:column;align-items:center}
  .seqstep .sn{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);border:1.5px solid var(--primary);color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .seqstep .sbar{flex:1;width:2px;background:var(--border);margin:3px 0}
  .seqstep .sc{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:10px;flex:1}
  .seqstep .sc .st{font-weight:650;margin-bottom:2px;font-size:13.5px}
  .seqstep .sc .ss{color:var(--text-3);font-size:12px}

  .kbgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .kbcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm)}
  .kbcard:hover{border-color:var(--primary-border);box-shadow:var(--shadow);transform:translateY(-2px)}
  .kbcard .kbi{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;margin-bottom:13px}
  .kbcard .kbi svg{width:20px;height:20px}
  .kbcard h4{font-size:14px;font-weight:650;margin-bottom:6px}
  .kbcard p{color:var(--text-3);font-size:12.5px;line-height:1.5}
  .kbcard .kbm{color:var(--primary);font-size:12.5px;font-weight:600;margin-top:12px;display:flex;align-items:center;gap:5px}
  .kbcard .kbm svg{width:14px;height:14px}

  .rolhead,.rolrow{display:grid;grid-template-columns:1.5fr repeat(4,1fr)}
  .rolhead>div{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:650;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em;font-size:10.5px;text-align:center;background:var(--surface-2)}
  .rolhead>div:first-child{text-align:left}
  .rolrow>div{padding:14px 16px;border-bottom:1px solid var(--border-2);text-align:center;font-size:13px}
  .rolrow:last-child>div{border-bottom:none}
  .rolrow>div:first-child{text-align:left;font-weight:600}
  .chk{color:var(--green)}
  .chk svg{width:17px;height:17px;stroke-width:2.5;margin:0 auto}
  .no{color:var(--text-3)}

  .mkgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .mkcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 16px;text-align:center;box-shadow:var(--shadow-sm);transition:.15s}
  .mkcard:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .mklogo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px;margin:0 auto 11px}
  .mkcard .mn{font-weight:650;font-size:13.5px}
  .mkcard .mc{color:var(--text-3);font-size:11.5px;margin:3px 0 12px}

  .phone{width:280px;height:566px;background:#0a0a0a;border-radius:40px;padding:11px;box-shadow:var(--shadow-lg);margin:0 auto;border:1px solid #222}
  .phscreen{background:var(--bg);border-radius:30px;height:100%;overflow:hidden;display:flex;flex-direction:column}
  .phtop{background:var(--surface);padding:18px 18px 14px;border-bottom:1px solid var(--border)}
  .phbody{flex:1;padding:14px;overflow-y:auto}
  .phcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .phnav{display:flex;justify-content:space-around;padding:14px;border-top:1px solid var(--border);background:var(--surface);color:var(--text-3)}
  .phnav svg{width:20px;height:20px}
  .phnav .on{color:var(--primary)}

  .slabar{height:6px;background:var(--surface-3);border-radius:10px;overflow:hidden;width:84px;display:inline-block;vertical-align:middle;margin-right:8px}
  .slabar i{display:block;height:100%;border-radius:10px}
  .enrich{background:var(--teal-soft);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent);border-radius:7px;padding:4px 9px;font-size:11px;color:var(--teal);font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .enrich svg{width:13px;height:13px}
  .progress{height:7px;background:var(--surface-3);border-radius:10px;overflow:hidden;margin-top:7px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-2));border-radius:10px}

  .drawer{position:fixed;top:0;right:-500px;width:470px;height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);transition:.28s cubic-bezier(.16,1,.3,1);z-index:50;overflow-y:auto;padding:26px}
  .drawer.open{right:0}
  .drawer .x{position:absolute;top:20px;right:20px;cursor:pointer;color:var(--text-3);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--surface-2)}
  .drawer .x:hover{background:var(--surface-3)}
  .dhead{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .dhead .bigav{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-weight:700;color:#fff;font-size:19px}
  .field{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-2);font-size:13.5px}
  .field span{color:var(--text-3)}
  .sechead{margin:22px 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:650}
  .overlay{position:fixed;inset:0;background:rgba(16,19,23,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.28s;z-index:40}
  .overlay.show{opacity:1;pointer-events:auto}
  .empty{color:var(--text-3);text-align:center;padding:60px 20px}
  a.lnk{color:var(--primary);cursor:pointer;text-decoration:none}
  #loginScreen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
  .loginCard{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-lg);padding:34px;width:100%;max-width:380px}
  .loginLogo{display:flex;align-items:center;gap:11px;margin-bottom:24px}
  .loginLogo .logo{width:34px;height:34px}
  .loginLogo b{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .loginCard h2{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .loginCard .lsub{color:var(--text-3);font-size:13.5px;margin:5px 0 22px}
  .lbtn{width:100%;justify-content:center;margin-top:8px;padding:11px}
  .lmsg{font-size:12.5px;min-height:16px;margin:6px 0 2px;color:var(--text-3)}
  .ldiv{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text-3);font-size:12px}
  .ldiv::before,.ldiv::after{content:"";flex:1;height:1px;background:var(--border)}
  .lhint{text-align:center;font-size:11.5px;color:var(--text-3);margin-top:18px;line-height:1.6}
  /* ===== Pagine (Notion) ===== */
  .nz-wrap{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
  @media (max-width:820px){.nz-wrap{grid-template-columns:1fr}}
  .nz-side{padding:12px 8px;position:sticky;top:12px}
  .nz-sidehead{display:flex;align-items:center;justify-content:space-between;padding:0 6px 10px}
  .nz-sidetitle{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--text);font-size:13px}
  .nz-sidetitle svg{width:15px;height:15px}
  .nz-tree{display:flex;flex-direction:column;gap:1px}
  .nz-treerow{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:7px;cursor:pointer;color:var(--text-2);font-size:13.5px;user-select:none}
  .nz-treerow:hover{background:var(--surface-2)}
  .nz-tree-active{background:var(--surface-3);color:var(--text);font-weight:600}
  .nz-chev{display:inline-flex;width:16px;justify-content:center;color:var(--text-3)}
  .nz-tw{display:inline-flex;cursor:pointer;transition:transform .15s}
  .nz-tw svg{width:13px;height:13px}.nz-tw-empty{width:13px}
  .nz-chev-open .nz-tw{transform:rotate(90deg)}
  .nz-emoji{font-size:14px;line-height:1}
  .nz-tt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nz-addchild{opacity:0;display:inline-flex;color:var(--text-3);border-radius:5px;padding:2px}
  .nz-addchild svg{width:13px;height:13px}
  .nz-treerow:hover .nz-addchild{opacity:1}
  .nz-addchild:hover{background:var(--surface);color:var(--primary)}
  .nz-editor{padding:28px 36px 40px;min-height:420px}
  .nz-crumbs{display:flex;align-items:center;flex-wrap:wrap;gap:4px;font-size:12px;color:var(--text-3);margin-bottom:18px}
  .nz-crumb{cursor:pointer;padding:2px 4px;border-radius:5px}
  .nz-crumb:hover{background:var(--surface-2);color:var(--text-2)}
  .nz-pagehead{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .nz-pageemoji{font-size:40px;line-height:1;cursor:pointer;border-radius:8px;padding:2px 6px}
  .nz-pageemoji:hover{background:var(--surface-2)}
  .nz-pagetitle{font-size:32px;font-weight:700;color:var(--text);outline:none;flex:1;line-height:1.2}
  .nz-blocks{display:flex;flex-direction:column;gap:2px}
  .nz-empty{color:var(--text-3);font-size:14px;padding:8px 0}
  .nz-block{position:relative;padding:3px 28px 3px 4px;border-radius:6px}
  .nz-block:hover{background:var(--surface-2)}
  .nz-bdel{position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:0;cursor:pointer;color:var(--text-3);font-size:18px;line-height:1;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:5px}
  .nz-block:hover .nz-bdel{opacity:1}
  .nz-bdel:hover{background:var(--surface-3);color:var(--text)}
  .nz-htext{font-size:22px;font-weight:700;color:var(--text);outline:none;padding:4px 0}
  .nz-ptext{font-size:15px;color:var(--text);outline:none;line-height:1.55;padding:2px 0;min-height:22px}
  .nz-todo,.nz-bullet{display:flex;align-items:flex-start;gap:8px}
  .nz-check{flex:0 0 auto;width:18px;height:18px;margin-top:3px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;background:var(--surface);transition:all .12s}
  .nz-check svg{width:12px;height:12px}
  .nz-done .nz-check{background:var(--green);border-color:var(--green)}
  .nz-todotext,.nz-bullettext{flex:1;font-size:15px;color:var(--text);outline:none;line-height:1.5;padding:1px 0}
  .nz-done .nz-todotext{text-decoration:line-through;color:var(--text-3)}
  .nz-dot{color:var(--text-2);font-size:18px;line-height:1.3;flex:0 0 auto;width:14px;text-align:center}
  .nz-db{border:1px solid var(--border);border-radius:10px;padding:0;margin:8px 0;overflow:hidden}
  .nz-db:hover{background:transparent}
  .nz-dbbar{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface-2);border-bottom:1px solid var(--border)}
  .nz-dblabel{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text-2)}
  .nz-dblabel svg{width:14px;height:14px}
  .nz-dbtabs{margin-left:auto}
  .nz-dbtabs .tab{display:inline-flex;align-items:center;gap:5px}.nz-dbtabs .tab svg{width:13px;height:13px}
  .nz-dbtable{margin:0;border:none;border-radius:0}.nz-dbtable table{width:100%}
  .nz-board{display:flex;gap:12px;padding:14px;overflow-x:auto}
  .nz-kcol{min-width:200px;flex:0 0 200px;background:var(--surface-2);border-radius:8px;padding:8px;min-height:auto}
  .nz-khead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .nz-kcount{font-size:11px;color:var(--text-3);font-weight:600}
  .nz-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:8px;cursor:pointer}
  .nz-card:hover{border-color:var(--primary)}
  .nz-cardtitle{font-size:13.5px;font-weight:600;color:var(--text)}
  .nz-cardsub{font-size:12px;color:var(--text-3);margin-top:2px}
  .nz-cardval{font-size:12px;font-weight:600;color:var(--green);margin-top:6px}
  .nz-addbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;padding-top:14px;border-top:1px dashed var(--border)}
  .nz-addbtn{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:var(--text-3);padding:4px 9px;border-radius:7px;cursor:pointer;border:1px solid transparent}
  .nz-addbtn svg{width:12px;height:12px}
  .nz-addbtn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border)}
  /* ===== Superadmin ===== */
  .sa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;align-items:start}
  .sa-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .sa-head h3{margin:0;font-size:15px;color:var(--text);flex:1}
  .sa-head svg{width:18px;height:18px;color:var(--primary)}
  .sa-sub{margin:0 0 12px;font-size:12.5px;color:var(--text-3)}
  .sa-ok{border-left:3px solid var(--green)!important}
  .sa-err{border-left:3px solid var(--red)!important}
  #saMemMsg,#saLinkMsg{margin-top:10px}
  /* ===== Organizzazione ===== */
  .org-filterbar{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
  .org-chiprow{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .org-chiplbl{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-3);margin-right:4px}
  .org-chiplbl svg{width:14px;height:14px}
  .org-chip{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;user-select:none;transition:.15s}
  .org-chip:hover{border-color:var(--primary);color:var(--text)}
  .org-chip.on{background:var(--primary);border-color:var(--primary);color:#fff}
  .org-bars{display:flex;flex-direction:column;gap:12px}
  .org-bar{display:grid;grid-template-columns:150px 1fr auto;gap:10px;align-items:center}
  .org-bar .lbl{font-size:13px;color:var(--text-2)}
  .org-bar .trk{height:10px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .org-bar .trk .fill{height:100%;border-radius:999px;background:var(--primary)}
  .org-bar .trk .fill.blu{background:var(--primary)}.org-bar .trk .fill.grn{background:var(--green)}.org-bar .trk .fill.amb{background:var(--amber)}.org-bar .trk .fill.pur{background:var(--purple)}.org-bar .trk .fill.cold{background:var(--teal)}.org-bar .trk .fill.plain{background:var(--text-3)}
  .org-bar .num{font-size:12px;color:var(--text-3);white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo" id="logo"></div><b>NovaCRM</b></div>
    <div class="org" onclick="cycleOrg()">
      <small>Workspace cliente</small>
      <div class="row"><b id="orgName">Rossi Costruzioni</b><span id="chevIcon"></span></div>
    </div>
    <div class="navwrap"><nav id="nav"></nav></div>
    <div class="side-foot"><div class="av">AC</div><div style="flex:1;min-width:0"><div class="nm">Armando C.</div><div class="rl">Amministratore</div></div><div class="iconbtn" id="logoutBtn" title="Esci" onclick="logout()" style="width:32px;height:32px"></div></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="pagehead"><div class="pt" id="pageTitle">Dashboard</div><div class="ps" id="pageSub"></div></div>
      <div class="spacer"></div>
      <div class="search"><span id="searchIcon"></span><input placeholder="Cerca…"></div>
      <div class="envtog" id="envtog" onclick="toggleEnv()"><span class="d"></span><span id="envlabel">Produzione</span></div>
      <div class="envtog" id="liveTog" title="Origine dei dati"><span class="d" style="background:var(--text-3)"></span><span id="liveLabel">Dati locali</span></div>
      <div class="iconbtn" id="themeBtn" onclick="toggleTheme()"></div>
      <div class="iconbtn" id="bellBtn"></div>
      <button class="btn" id="newBtn"></button>
    </div>
    <div class="sbxbanner" id="sbxbanner"></div>
    <div class="content"><div class="view" id="content"></div></div>
  </div>
</div>

<div id="loginScreen">
  <div class="loginCard">
    <div class="loginLogo"><div class="logo"><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg></div><b>NovaCRM</b></div>
    <h2>Accedi al tuo CRM</h2>
    <div class="lsub">Entra nel tuo workspace o prova la demo.</div>
    <button class="btn ghost lbtn" onclick="googleLogin()" style="gap:10px;margin-top:0"><svg width="17" height="17" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.6 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.6 4.5 24 4.5 16.3 4.5 9.7 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 34.6 26.7 35.5 24 35.5c-5.3 0-9.7-3.1-11.3-7.5l-6.5 5C9.6 39 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.2 36.5 43.5 30.9 43.5 24c0-1.2-.1-2.3-.4-3.5z"/></svg>Continua con Google</button>
    <div class="ldiv"><span>oppure con email</span></div>
    <div class="ff"><label>Email</label><input id="l_email" type="email" value="demo@novacrm.it" autocomplete="username"></div>
    <div class="ff"><label>Password</label><input id="l_pwd" type="password" value="Demo1234!" autocomplete="current-password"></div>
    <div id="l_msg" class="lmsg"></div>
    <button class="btn lbtn" onclick="doLogin()">Accedi</button>
    <div class="ldiv"><span>oppure</span></div>
    <button class="btn ghost lbtn" onclick="demoMode()">Entra in modalità demo</button>
    <div class="lhint">Accesso riservato, solo su invito.<br>Demo: demo@novacrm.it · Demo1234!</div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script>
/* ===== ICON SET (Feather-style) ===== */
const ICONS={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  building:'<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/>',
  check:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/>',

async function rpc(fn,args){
  const r=await fetch(SUPA.url+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:SUPA.key,Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(args||{})});

function orgByArea(){const m=new Map();DATA.contatti.forEach(c=>{const k=orgLbl(c.area);if(!m.has(k))m.set(k,{nome:k,count:0,val:0});const o=m.get(k);o.count++;o.val+=(+c.val||0);});return [...m.values()].sort((a,b)=>b.val-a.val);}
function orgByMktg(){const m=new Map();DATA.contatti.forEach(c=>{const k=orgLbl(c.mktg);if(!m.has(k))m.set(k,{nome:k,count:0,val:0});const o=m.get(k);o.count++;o.val+=(+c.val||0);});return [...m.values()].sort((a,b)=>b.count-a.count);}
function orgPipeByArea(){const m=new Map();DATA.deals.forEach(d=>{const k=orgLbl(d.area);if(!m.has(k))m.set(k,{nome:k,count:0,val:0});const o=m.get(k);o.count++;o.val+=(+d.val||0);});return [...m.values()].sort((a,b)=>b.val-a.val);}
function orgFiltered(){return DATA.contatti.filter(c=>{if(orgF.area!==null&&orgLbl(c.area)!==orgF.area)return false;if(orgF.mktg!==null&&orgLbl(c.mktg)!==orgF.mktg)return false;return true;});}
const ORG_PILLS=['blu','grn','amb','pur','cold','plain'];
function orgPillCls(i){return ORG_PILLS[i%ORG_PILLS.length];}
function vOrg(){const areas=orgByArea(),mktg=orgByMktg(),pipe=orgPipeByArea();const totContatti=DATA.contatti.length;const totVal=DATA.contatti.reduce((s,c)=>s+(+c.val||0),0);
  let kpis=`<div class="kpis"><div class="card kpi"><small>${icon('grid')} Totale workspace</small><div class="v">${esc(String(totContatti))}</div><div class="d">${eur(totVal)} di valore</div></div>`;
  areas.forEach(a=>{kpis+=`<div class="card kpi"><small>${icon('building')} ${esc(a.nome)}</small><div class="v">${esc(String(a.count))}</div><div class="d">${eur(a.val)} · contatti</div></div>`;});kpis+=`</div>`;
  const maxMk=Math.max(1,...mktg.map(x=>x.count));let mkBars=`<div class="card"><h3>${icon('share')} Distribuzione per approccio marketing</h3><div class="org-bars">`;mktg.forEach((x,i)=>{const pct=Math.round((x.count/maxMk)*100);mkBars+=`<div class="org-bar"><div class="lbl">${esc(x.nome)}</div><div class="trk"><div class="fill ${orgPillCls(i)}" style="width:${pct}%"></div></div><div class="num">${esc(String(x.count))} · ${eur(x.val)}</div></div>`;});mkBars+=`</div></div>`;
  const maxPipe=Math.max(1,...pipe.map(x=>x.val));const totPipe=pipe.reduce((s,x)=>s+x.val,0);let pipeCard=`<div class="card"><h3>${icon('chart')} Pipeline per area di business</h3><div style="color:var(--text-3);font-size:12px;margin-bottom:12px">${eur(totPipe)} su ${esc(String(DATA.deals.length))} trattative</div><div class="actlist">`;pipe.forEach((x,i)=>{const pct=Math.round((x.val/maxPipe)*100);pipeCard+=`<div style="padding:9px 4px;border-bottom:1px solid var(--border-2)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="pill ${orgPillCls(i)}">${esc(x.nome)}</span><strong>${eur(x.val)} <span style="color:var(--text-3);font-weight:400">(${esc(String(x.count))})</span></strong></div><div class="progress"><i style="width:${pct}%"></i></div></div>`;});pipeCard+=`</div></div>`;
  const fc=orgFiltered();const areaNames=areas.map(a=>a.nome),mktgNames=mktg.map(m=>m.nome);
  let chipsArea=`<span class="org-chip ${orgF.area===null?'on':''}" data-org-area="">Tutte le aree</span>`+areaNames.map(n=>`<span class="org-chip ${orgF.area===n?'on':''}" data-org-area="${esc(n)}">${esc(n)}</span>`).join('');
  let chipsMk=`<span class="org-chip ${orgF.mktg===null?'on':''}" data-org-mktg="">Tutti gli approcci</span>`+mktgNames.map(n=>`<span class="org-chip ${orgF.mktg===n?'on':''}" data-org-mktg="${esc(n)}">${esc(n)}</span>`).join('');
  let rows='';if(fc.length===0){rows=`<tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:24px">Nessun contatto per i filtri selezionati.</td></tr>`;}else{fc.forEach(c=>{rows+=`<tr><td><div style="display:flex;align-items:center;gap:8px"><span class="miniav" style="background:${ci(c.n)}">${esc(initials(c.n))}</span><div><div>${esc(c.n)}</div><div style="font-size:12px;color:var(--text-3)">${esc(c.ruolo||'')}</div></div></div></td><td>${esc(c.az||'')}</td><td><span class="pill plain">${esc(orgLbl(c.area))}</span></td><td><span class="pill cold">${esc(orgLbl(c.mktg))}</span></td><td>${esc(c.stato||'')}</td><td style="text-align:right">${eur(+c.val||0)}</td></tr>`;});}
  const tbl=`<div class="card"><h3>${icon('users')} Contatti per area</h3><div class="org-filterbar"><div class="org-chiprow"><span class="org-chiplbl">${icon('building')} Business</span>${chipsArea}</div><div class="org-chiprow"><span class="org-chiplbl">${icon('share')} Marketing</span>${chipsMk}</div></div><div style="color:var(--text-3);font-size:12px;margin:6px 0 10px">${esc(String(fc.length))} contatti${(orgF.area||orgF.mktg)?' (filtrati)':''}</div><div class="tablecard"><table><thead><tr><th>Contatto</th><th>Azienda</th><th>Area business</th><th>Marketing</th><th>Stato</th><th style="text-align:right">Valore</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  return `${kpis}<div class="grid2">${mkBars}${pipeCard}</div>${tbl}`;}
window.wireOrg=function(){document.querySelectorAll('[data-org-area]').forEach(el=>el.addEventListener('click',()=>{const v=el.getAttribute('data-org-area');orgF.area=(v==='')?null:v;render('organizzazione');}));document.querySelectorAll('[data-org-mktg]').forEach(el=>el.addEventListener('click',()=>{const v=el.getAttribute('data-org-mktg');orgF.mktg=(v==='')?null:v;render('organizzazione');}));};

(function boot(){
  const hp=new URLSearchParams(location.hash.slice(1));
  if(hp.get('access_token')){token=hp.get('access_token');mode='auth';localStorage.setItem('nova_token',token);const em=emailFromJwt(token);if(em)localStorage.setItem('nova_email',em);history.replaceState(null,'',location.pathname+location.search);startApp();return;}
  const saved=localStorage.getItem('nova_token');
  if(saved){token=saved;mode='auth';startApp();}else{showLogin();}
})();
</script>
</body>
