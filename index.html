<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaCRM</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iIzRmNDZlNSIvPjxjaXJjbGUgY3g9IjE2IiBjeT0iMTYiIHI9IjkiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZmZmZiIgc3Ryb2tlLXdpZHRoPSIyLjYiLz48Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIzLjQiIGZpbGw9IiNmZmZmZmYiLz48L3N2Zz4=">
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f3f4f7; --surface-3:#eceef2;
    --border:#e5e7eb; --border-2:#eef0f3;
    --text:#101317; --text-2:#5b6472; --text-3:#9097a3;
    --primary:#4f46e5; --primary-2:#6366f1; --primary-soft:#eef0fe; --primary-border:#dcdcff;
    --green:#15a34a; --green-soft:#e8f6ee; --amber:#d97706; --amber-soft:#fdf1e3;
    --red:#dc2626; --red-soft:#fdeaea; --teal:#0d9488; --teal-soft:#e3f4f2; --purple:#7c3aed; --purple-soft:#f1eafe;
    --shadow-sm:0 1px 2px rgba(16,19,23,.05);
    --shadow:0 2px 8px rgba(16,19,23,.06),0 1px 2px rgba(16,19,23,.04);
    --shadow-lg:0 12px 32px rgba(16,19,23,.12);
    --r:10px; --r-lg:14px;
  }
  [data-theme="dark"]{
    --bg:#0d0f14; --surface:#13161d; --surface-2:#1a1e27; --surface-3:#222732;
    --border:#252a35; --border-2:#1e222c;
    --text:#eceef3; --text-2:#9aa2b1; --text-3:#6a7281;
    --primary:#6366f1; --primary-2:#818cf8; --primary-soft:#1c1f3a; --primary-border:#2e3358;
    --green:#34d399; --green-soft:#11261d; --amber:#fbbf24; --amber-soft:#2a2113;
    --red:#f87171; --red-soft:#2a1517; --teal:#2dd4bf; --teal-soft:#0f2522; --purple:#a78bfa; --purple-soft:#1e1733;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 2px 10px rgba(0,0,0,.35);
    --shadow-lg:0 16px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px;
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  svg{display:block}
  .ico{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh}

  /* ===== SIDEBAR ===== */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 18px 14px}
  .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-sm)}
  .logo svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2}
  .brand b{font-size:16px;font-weight:700;letter-spacing:-.02em}
  .org{margin:2px 12px 10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.15s}
  .org:hover{background:var(--surface-3)}
  .org small{color:var(--text-3);font-size:11px;font-weight:500}
  .org .row{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
  .org b{font-size:13.5px;font-weight:650}
  .org .row svg{width:15px;height:15px;color:var(--text-3)}
  .navwrap{flex:1;overflow-y:auto;padding:6px 12px 12px}
  .navwrap::-webkit-scrollbar{width:6px}
  .navwrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
  .navgroup{color:var(--text-3);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:14px 10px 6px;font-weight:650}
  .navitem{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;color:var(--text-2);cursor:pointer;font-weight:550;transition:.13s;margin-bottom:1px;position:relative}
  .navitem:hover{background:var(--surface-2);color:var(--text)}
  .navitem.active{background:var(--primary-soft);color:var(--primary)}
  .navitem.active .ico{color:var(--primary)}
  .navitem .ico{width:17px;height:17px;color:var(--text-3)}
  .navitem:hover .ico{color:var(--text-2)}
  .navitem .lbl{flex:1}
  .navitem .badge{background:var(--primary);color:#fff;border-radius:20px;font-size:10.5px;padding:1px 7px;font-weight:700}
  .navitem .badge.amb{background:var(--amber)}
  .side-foot{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--primary));display:grid;place-items:center;font-weight:700;color:#fff;font-size:12px}
  .side-foot .nm{font-weight:600;font-size:13px;line-height:1.3}
  .side-foot .rl{color:var(--text-3);font-size:11px}

  /* ===== MAIN ===== */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:14px;padding:13px 26px;border-bottom:1px solid var(--border);background:var(--surface)}
  .pagehead .pt{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .pagehead .ps{font-size:12.5px;color:var(--text-3);margin-top:1px}
  .spacer{flex:1}
  .search{width:240px;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text-3);transition:.15s}
  .search:focus-within{border-color:var(--primary-border);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft)}
  .search svg{width:16px;height:16px}
  .search input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:13px;font-family:inherit}
  .iconbtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);display:grid;place-items:center;cursor:pointer;color:var(--text-2);transition:.15s}
  .iconbtn:hover{background:var(--surface-3);color:var(--text)}
  .iconbtn svg{width:17px;height:17px}
  .envtog{display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text-2);transition:.15s}
  .envtog:hover{background:var(--surface-3)}
  .envtog .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .envtog.sbx{border-color:var(--amber);color:var(--amber)}
  .envtog.sbx .d{background:var(--amber)}
  .btn{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:9px;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:7px;font-family:inherit;transition:.15s;box-shadow:var(--shadow-sm)}
  .btn:hover{background:var(--primary-2)}
  .btn svg{width:16px;height:16px;stroke-width:2.2}
  .btn.ghost{background:var(--surface);border:1px solid var(--border);color:var(--text);box-shadow:none}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .sbxbanner{background:var(--amber-soft);border-bottom:1px solid var(--amber);color:var(--amber);padding:8px 26px;font-size:12.5px;font-weight:600;display:none;align-items:center;gap:8px}
  .sbxbanner.show{display:flex}
  .sbxbanner svg{width:15px;height:15px}
  .content{padding:24px 26px;overflow-y:auto;flex:1}
  .content::-webkit-scrollbar{width:9px}
  .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .view{animation:fade .28s ease}

  /* ===== COMPONENTS ===== */
  .callout{background:var(--primary-soft);border:1px solid var(--primary-border);border-radius:var(--r);padding:12px 14px;margin-bottom:20px;color:var(--text-2);font-size:13px;display:flex;gap:11px;line-height:1.55}
  .callout svg{width:17px;height:17px;color:var(--primary);flex-shrink:0;margin-top:1px}
  .callout b{color:var(--text)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm)}
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
  .grid2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .kpi small{color:var(--text-3);font-size:12px;font-weight:550;display:flex;align-items:center;gap:7px}
  .kpi small svg{width:15px;height:15px;color:var(--text-3)}
  .kpi .v{font-size:27px;font-weight:750;margin:10px 0 5px;letter-spacing:-.02em}
  .kpi .d{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
  .kpi .d svg{width:13px;height:13px}
  .up{color:var(--green)} .down{color:var(--red)}
  .card h3{font-size:14px;font-weight:650;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .card h3 a{color:var(--primary);font-size:12.5px;cursor:pointer;font-weight:600}

  .bars{display:flex;align-items:flex-end;gap:13px;height:168px;padding-top:10px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;height:100%;justify-content:flex-end}
  .bar .col{width:100%;background:linear-gradient(180deg,var(--primary-2),var(--primary));border-radius:6px 6px 0 0;transition:.4s;min-height:4px}
  .bar:hover .col{filter:brightness(1.1)}
  .bar span{color:var(--text-3);font-size:11px;font-weight:500}
  .donut{display:flex;align-items:center;gap:22px}
  .leg{display:flex;flex-direction:column;gap:10px;font-size:13px}
  .leg div{display:flex;align-items:center;gap:9px;color:var(--text-2)}
  .leg i{width:10px;height:10px;border-radius:3px;display:inline-block}

  .actlist{display:flex;flex-direction:column}
  .actrow{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:9px;border-bottom:1px solid var(--border-2)}
  .actrow:last-child{border-bottom:none}
  .actrow:hover{background:var(--surface-2)}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .actrow .t{font-weight:600;font-size:13.5px}
  .actrow .s{color:var(--text-3);font-size:12px;margin-top:1px}
  .actrow time{margin-left:auto;color:var(--text-3);font-size:12px;white-space:nowrap}

  .tablecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:12px 16px;border-bottom:1px solid var(--border);font-weight:650;background:var(--surface-2)}
  td{padding:13px 16px;border-bottom:1px solid var(--border-2);font-size:13.5px}
  tbody tr{cursor:pointer;transition:.12s}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:7px;font-size:11.5px;font-weight:600}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .pill.lead{background:var(--amber-soft);color:var(--amber)}
  .pill.qual{background:var(--teal-soft);color:var(--teal)}
  .pill.cli{background:var(--green-soft);color:var(--green)}
  .pill.cold{background:var(--surface-3);color:var(--text-2)}
  .pill.red{background:var(--red-soft);color:var(--red)}
  .pill.amb{background:var(--amber-soft);color:var(--amber)}
  .pill.grn{background:var(--green-soft);color:var(--green)}
  .pill.blu{background:var(--primary-soft);color:var(--primary)}
  .pill.pur{background:var(--purple-soft);color:var(--purple)}
  .pill.plain::before{display:none}
  .uava{display:flex;align-items:center;gap:10px}
  .miniav{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:650;color:#fff;font-size:11.5px;flex-shrink:0}

  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;align-items:start}
  .kcol{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px;min-height:220px}
  .kcol h4{font-size:12.5px;font-weight:650;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .kcol h4 .cnt{color:var(--text-3);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:0 7px;font-size:11px}
  .ksum{color:var(--text-3);font-size:12px;font-weight:600;margin-bottom:11px}
  .deal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;cursor:grab;box-shadow:var(--shadow-sm);transition:.15s}
  .deal:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .deal:active{cursor:grabbing}
  .deal.drag{opacity:.4}
  .deal .dn{font-weight:600;margin-bottom:4px;font-size:13px}
  .deal .dc{color:var(--text-3);font-size:12px;margin-bottom:10px}
  .deal .dv{font-weight:750;color:var(--text)}
  .deal .dm{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .kcol.over{outline:2px dashed var(--primary);outline-offset:-2px;background:var(--primary-soft)}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .tabs.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .tabs.scroll .tab{white-space:nowrap;flex:0 0 auto}
  .tab{padding:7px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--text-2);transition:.13s}
  .tab:hover{background:var(--surface-2)}
  .tab.active{background:var(--primary);border-color:var(--primary);color:#fff}

  .mailwrap{display:grid;grid-template-columns:340px 1fr;gap:16px;height:calc(100vh - 220px)}
  .maillist,.chatlist{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;box-shadow:var(--shadow-sm)}
  .mailitem{padding:14px 16px;border-bottom:1px solid var(--border-2);cursor:pointer;transition:.12s}
  .mailitem:hover{background:var(--surface-2)}
  .mailitem.active{background:var(--primary-soft)}
  .mailitem .mh{display:flex;justify-content:space-between;margin-bottom:4px}
  .mailitem .mfrom{font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .mailitem .mtime{color:var(--text-3);font-size:11px}
  .mailitem .msub{font-weight:600;font-size:13px;margin-bottom:3px}
  .mailitem .mprev{color:var(--text-3);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mailitem.unread .mfrom::before{content:"";display:inline-block;width:7px;height:7px;background:var(--primary);border-radius:50%}
  .mailview{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;overflow-y:auto;box-shadow:var(--shadow-sm)}
  .linkbox{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:16px 0;display:flex;align-items:center;gap:12px}
  .linkbox .lt{font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-weight:650;margin-bottom:2px}
  .linkbox svg{width:18px;height:18px;color:var(--primary)}
  .mailbody{line-height:1.7;color:var(--text-2);margin-top:18px}
  .mailbody p{margin-bottom:12px}
  .ai-box{background:var(--purple-soft);border:1px solid color-mix(in srgb,var(--purple) 30%,transparent);border-radius:10px;padding:14px 16px;margin:16px 0}
  .ai-box .ai-h{display:flex;align-items:center;gap:8px;font-weight:650;color:var(--purple);margin-bottom:8px;font-size:13px}
  .ai-box .ai-h svg{width:16px;height:16px}
  .ai-box ul{margin:0;padding-left:18px;line-height:1.7;color:var(--text-2);font-size:13px}

  .chatwrap{display:grid;grid-template-columns:300px 1fr;gap:16px;height:calc(100vh - 220px)}
  .chatconv{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  .chathead{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
  .chatbody{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:11px;background:var(--surface-2)}
  .bub{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;box-shadow:var(--shadow-sm)}
  .bub.in{background:var(--surface);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
  .bub.out{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .bub .bt{font-size:10px;opacity:.6;margin-top:4px}
  .chatinput{padding:13px;border-top:1px solid var(--border);display:flex;gap:10px}
  .chatinput input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);outline:none;font-family:inherit;font-size:13px}

  .formprev{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:26px;max-width:430px}
  .formprev h4{font-size:18px;margin-bottom:4px;letter-spacing:-.02em}
  .formprev p{color:var(--text-3);font-size:13px;margin-bottom:18px}
  .ff{margin-bottom:14px}
  .ff label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text-2)}
  .ff input,.ff select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit}
  .formprev .sub{background:var(--primary);color:#fff;border:none;width:100%;padding:12px;border-radius:8px;font-weight:650;cursor:pointer;font-family:inherit;font-size:13px}
  .code{background:var(--surface-3);border:1px solid var(--border);border-radius:9px;padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--text-2);white-space:pre-wrap;line-height:1.6}

  .bp{display:flex;align-items:center;gap:0;overflow-x:auto;padding:10px 0 4px}
  .bp-step{flex-shrink:0;text-align:center;min-width:90px}
  .bp-circle{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-weight:700;margin:0 auto 9px;border:2px solid var(--border);background:var(--surface);color:var(--text-3)}
  .bp-circle.done{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .bp-circle.done svg{width:20px;height:20px;stroke-width:2.5}
  .bp-circle.cur{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .bp-step .bl{font-size:12px;font-weight:600}
  .bp-step .bs{font-size:11px;color:var(--text-3)}
  .bp-arrow{flex:1;min-width:30px;height:2px;background:var(--border);margin:0 4px 32px}
  .trans{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:16px;display:flex;align-items:center;gap:14px}
  .trans .ti{width:34px;height:34px;border-radius:9px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;flex-shrink:0}

  .wf{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
  .wf-h{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .wf-h .wi{width:30px;height:30px;border-radius:8px;background:var(--amber-soft);color:var(--amber);display:grid;place-items:center}
  .wf-h b{font-weight:650}
  .wf-flow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .wf-node{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12.5px}
  .wf-node b{display:block;font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;font-weight:650}
  .wf-arrow{color:var(--text-3)}
  .toggle{width:38px;height:22px;background:var(--green);border-radius:20px;position:relative;cursor:pointer;flex-shrink:0;transition:.2s}
  .toggle::after{content:"";position:absolute;top:2px;left:18px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:var(--shadow-sm)}
  .toggle.off{background:var(--border)}
  .toggle.off::after{left:2px}
  .ml-auto{margin-left:auto}

  .cal{display:grid;grid-template-columns:56px repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .cal .ch{background:var(--surface);padding:11px;text-align:center;font-size:12px;font-weight:650}
  .cal .ct{background:var(--surface);padding:8px;font-size:11px;color:var(--text-3);text-align:right}
  .cal .cc{background:var(--surface);min-height:56px;padding:4px}
  .ev{border-radius:6px;padding:5px 8px;font-size:11px;font-weight:600;margin-bottom:3px;color:#fff;cursor:pointer}

  .seqstep{display:flex;gap:14px}
  .seqstep .sl{display:flex;flex-direction:column;align-items:center}
  .seqstep .sn{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);border:1.5px solid var(--primary);color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .seqstep .sbar{flex:1;width:2px;background:var(--border);margin:3px 0}
  .seqstep .sc{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:10px;flex:1}
  .seqstep .sc .st{font-weight:650;margin-bottom:2px;font-size:13.5px}
  .seqstep .sc .ss{color:var(--text-3);font-size:12px}

  .kbgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .kbcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm)}
  .kbcard:hover{border-color:var(--primary-border);box-shadow:var(--shadow);transform:translateY(-2px)}
  .kbcard .kbi{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;margin-bottom:13px}
  .kbcard .kbi svg{width:20px;height:20px}
  .kbcard h4{font-size:14px;font-weight:650;margin-bottom:6px}
  .kbcard p{color:var(--text-3);font-size:12.5px;line-height:1.5}
  .kbcard .kbm{color:var(--primary);font-size:12.5px;font-weight:600;margin-top:12px;display:flex;align-items:center;gap:5px}
  .kbcard .kbm svg{width:14px;height:14px}

  .rolhead,.rolrow{display:grid;grid-template-columns:1.5fr repeat(4,1fr)}
  .rolhead>div{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:650;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em;font-size:10.5px;text-align:center;background:var(--surface-2)}
  .rolhead>div:first-child{text-align:left}
  .rolrow>div{padding:14px 16px;border-bottom:1px solid var(--border-2);text-align:center;font-size:13px}
  .rolrow:last-child>div{border-bottom:none}
  .rolrow>div:first-child{text-align:left;font-weight:600}
  .chk{color:var(--green)}
  .chk svg{width:17px;height:17px;stroke-width:2.5;margin:0 auto}
  .no{color:var(--text-3)}

  .mkgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .mkcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 16px;text-align:center;box-shadow:var(--shadow-sm);transition:.15s}
  .mkcard:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .mklogo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px;margin:0 auto 11px}
  .mkcard .mn{font-weight:650;font-size:13.5px}
  .mkcard .mc{color:var(--text-3);font-size:11.5px;margin:3px 0 12px}

  .phone{width:280px;height:566px;background:#0a0a0a;border-radius:40px;padding:11px;box-shadow:var(--shadow-lg);margin:0 auto;border:1px solid #222}
  .phscreen{background:var(--bg);border-radius:30px;height:100%;overflow:hidden;display:flex;flex-direction:column}
  .phtop{background:var(--surface);padding:18px 18px 14px;border-bottom:1px solid var(--border)}
  .phbody{flex:1;padding:14px;overflow-y:auto}
  .phcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .phnav{display:flex;justify-content:space-around;padding:14px;border-top:1px solid var(--border);background:var(--surface);color:var(--text-3)}
  .phnav svg{width:20px;height:20px}
  .phnav .on{color:var(--primary)}

  .slabar{height:6px;background:var(--surface-3);border-radius:10px;overflow:hidden;width:84px;display:inline-block;vertical-align:middle;margin-right:8px}
  .slabar i{display:block;height:100%;border-radius:10px}
  .enrich{background:var(--teal-soft);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent);border-radius:7px;padding:4px 9px;font-size:11px;color:var(--teal);font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .enrich svg{width:13px;height:13px}
  .progress{height:7px;background:var(--surface-3);border-radius:10px;overflow:hidden;margin-top:7px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-2));border-radius:10px}

  .drawer{position:fixed;top:0;right:-500px;width:470px;height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);transition:.28s cubic-bezier(.16,1,.3,1);z-index:50;overflow-y:auto;padding:26px}
  .drawer.open{right:0}
  .drawer .x{position:absolute;top:20px;right:20px;cursor:pointer;color:var(--text-3);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--surface-2)}
  .drawer .x:hover{background:var(--surface-3)}
  .dhead{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .dhead .bigav{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-weight:700;color:#fff;font-size:19px}
  .field{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-2);font-size:13.5px}
  .field span{color:var(--text-3)}
  .sechead{margin:22px 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:650}
  .overlay{position:fixed;inset:0;background:rgba(16,19,23,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.28s;z-index:40}
  .overlay.show{opacity:1;pointer-events:auto}
  .empty{color:var(--text-3);text-align:center;padding:60px 20px}
  a.lnk{color:var(--primary);cursor:pointer;text-decoration:none}
  #loginScreen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
  .loginCard{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-lg);padding:34px;width:100%;max-width:380px}
  .loginLogo{display:flex;align-items:center;gap:11px;margin-bottom:24px}
  .loginLogo .logo{width:34px;height:34px}
  .loginLogo b{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .loginCard h2{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .loginCard .lsub{color:var(--text-3);font-size:13.5px;margin:5px 0 22px}
  .lbtn{width:100%;justify-content:center;margin-top:8px;padding:11px}
  .lmsg{font-size:12.5px;min-height:16px;margin:6px 0 2px;color:var(--text-3)}
  .ldiv{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text-3);font-size:12px}
  .ldiv::before,.ldiv::after{content:"";flex:1;height:1px;background:var(--border)}
  .lhint{text-align:center;font-size:11.5px;color:var(--text-3);margin-top:18px;line-height:1.6}
  /* ===== Pagine (Notion) ===== */
  .nz-wrap{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
  @media (max-width:820px){.nz-wrap{grid-template-columns:1fr}}
  .nz-side{padding:12px 8px;position:sticky;top:12px}
  .nz-sidehead{display:flex;align-items:center;justify-content:space-between;padding:0 6px 10px}
  .nz-sidetitle{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--text);font-size:13px}
  .nz-sidetitle svg{width:15px;height:15px}
  .nz-tree{display:flex;flex-direction:column;gap:1px}
  .nz-treerow{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:7px;cursor:pointer;color:var(--text-2);font-size:13.5px;user-select:none}
  .nz-treerow:hover{background:var(--surface-2)}
  .nz-tree-active{background:var(--surface-3);color:var(--text);font-weight:600}
  .nz-chev{display:inline-flex;width:16px;justify-content:center;color:var(--text-3)}
  .nz-tw{display:inline-flex;cursor:pointer;transition:transform .15s}
  .nz-tw svg{width:13px;height:13px}.nz-tw-empty{width:13px}
  .nz-chev-open .nz-tw{transform:rotate(90deg)}
  .nz-emoji{font-size:14px;line-height:1}
  .nz-tt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nz-addchild{opacity:0;display:inline-flex;color:var(--text-3);border-radius:5px;padding:2px}
  .nz-addchild svg{width:13px;height:13px}
  .nz-treerow:hover .nz-addchild{opacity:1}
  .nz-addchild:hover{background:var(--surface);color:var(--primary)}
  .nz-editor{padding:28px 36px 40px;min-height:420px}
  .nz-crumbs{display:flex;align-items:center;flex-wrap:wrap;gap:4px;font-size:12px;color:var(--text-3);margin-bottom:18px}
  .nz-crumb{cursor:pointer;padding:2px 4px;border-radius:5px}
  .nz-crumb:hover{background:var(--surface-2);color:var(--text-2)}
  .nz-pagehead{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .nz-pageemoji{font-size:40px;line-height:1;cursor:pointer;border-radius:8px;padding:2px 6px}
  .nz-pageemoji:hover{background:var(--surface-2)}
  .nz-pagetitle{font-size:32px;font-weight:700;color:var(--text);outline:none;flex:1;line-height:1.2}
  .nz-blocks{display:flex;flex-direction:column;gap:2px}
  .nz-empty{color:var(--text-3);font-size:14px;padding:8px 0}
  .nz-block{position:relative;padding:3px 28px 3px 4px;border-radius:6px}
  .nz-block:hover{background:var(--surface-2)}
  .nz-bdel{position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:0;cursor:pointer;color:var(--text-3);font-size:18px;line-height:1;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:5px}
  .nz-block:hover .nz-bdel{opacity:1}
  .nz-bdel:hover{background:var(--surface-3);color:var(--text)}
  .nz-htext{font-size:22px;font-weight:700;color:var(--text);outline:none;padding:4px 0}
  .nz-ptext{font-size:15px;color:var(--text);outline:none;line-height:1.55;padding:2px 0;min-height:22px}
  .nz-todo,.nz-bullet{display:flex;align-items:flex-start;gap:8px}
  .nz-check{flex:0 0 auto;width:18px;height:18px;margin-top:3px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;background:var(--surface);transition:all .12s}
  .nz-check svg{width:12px;height:12px}
  .nz-done .nz-check{background:var(--green);border-color:var(--green)}
  .nz-todotext,.nz-bullettext{flex:1;font-size:15px;color:var(--text);outline:none;line-height:1.5;padding:1px 0}
  .nz-done .nz-todotext{text-decoration:line-through;color:var(--text-3)}
  .nz-dot{color:var(--text-2);font-size:18px;line-height:1.3;flex:0 0 auto;width:14px;text-align:center}
  .nz-db{border:1px solid var(--border);border-radius:10px;padding:0;margin:8px 0;overflow:hidden}
  .nz-db:hover{background:transparent}
  .nz-dbbar{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface-2);border-bottom:1px solid var(--border)}
  .nz-dblabel{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text-2)}
  .nz-dblabel svg{width:14px;height:14px}
  .nz-dbtabs{margin-left:auto}
  .nz-dbtabs .tab{display:inline-flex;align-items:center;gap:5px}.nz-dbtabs .tab svg{width:13px;height:13px}
  .nz-dbtable{margin:0;border:none;border-radius:0}.nz-dbtable table{width:100%}
  .nz-board{display:flex;gap:12px;padding:14px;overflow-x:auto}
  .nz-kcol{min-width:200px;flex:0 0 200px;background:var(--surface-2);border-radius:8px;padding:8px;min-height:auto}
  .nz-khead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .nz-kcount{font-size:11px;color:var(--text-3);font-weight:600}
  .nz-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:8px;cursor:pointer}
  .nz-card:hover{border-color:var(--primary)}
  .nz-cardtitle{font-size:13.5px;font-weight:600;color:var(--text)}
  .nz-cardsub{font-size:12px;color:var(--text-3);margin-top:2px}
  .nz-cardval{font-size:12px;font-weight:600;color:var(--green);margin-top:6px}
  .nz-addbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;padding-top:14px;border-top:1px dashed var(--border)}
  .nz-addbtn{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:var(--text-3);padding:4px 9px;border-radius:7px;cursor:pointer;border:1px solid transparent}
  .nz-addbtn svg{width:12px;height:12px}
  .nz-addbtn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border)}
  /* ===== Superadmin ===== */
  .sa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;align-items:start}
  .sa-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .sa-head h3{margin:0;font-size:15px;color:var(--text);flex:1}
  .sa-head svg{width:18px;height:18px;color:var(--primary)}
  .sa-sub{margin:0 0 12px;font-size:12.5px;color:var(--text-3)}
  .sa-ok{border-left:3px solid var(--green)!important}
  .sa-err{border-left:3px solid var(--red)!important}
  #saMemMsg,#saLinkMsg{margin-top:10px}
  /* ===== Organizzazione ===== */
  .org-filterbar{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
  .org-chiprow{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .org-chiplbl{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-3);margin-right:4px}
  .org-chiplbl svg{width:14px;height:14px}
  .org-chip{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;user-select:none;transition:.15s}
  .org-chip:hover{border-color:var(--primary);color:var(--text)}
  .org-chip.on{background:var(--primary);border-color:var(--primary);color:#fff}
  .org-bars{display:flex;flex-direction:column;gap:12px}
  .org-bar{display:grid;grid-template-columns:150px 1fr auto;gap:10px;align-items:center}
  .org-bar .lbl{font-size:13px;color:var(--text-2)}
  .org-bar .trk{height:10px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .org-bar .trk .fill{height:100%;border-radius:999px;background:var(--primary)}
  .org-bar .trk .fill.blu{background:var(--primary)}.org-bar .trk .fill.grn{background:var(--green)}.org-bar .trk .fill.amb{background:var(--amber)}.org-bar .trk .fill.pur{background:var(--purple)}.org-bar .trk .fill.cold{background:var(--teal)}.org-bar .trk .fill.plain{background:var(--text-3)}
  .org-bar .num{font-size:12px;color:var(--text-3);white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo" id="logo"></div><b>NovaCRM</b></div>
    <div class="org" onclick="cycleOrg()">
      <small>Workspace cliente</small>
      <div class="row"><b id="orgName">Rossi Costruzioni</b><span id="chevIcon"></span></div>
    </div>
    <div class="navwrap"><nav id="nav"></nav></div>
    <div class="side-foot"><div class="av">AC</div><div style="flex:1;min-width:0"><div class="nm">Armando C.</div><div class="rl">Amministratore</div></div><div class="iconbtn" id="logoutBtn" title="Esci" onclick="logout()" style="width:32px;height:32px"></div></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="pagehead"><div class="pt" id="pageTitle">Dashboard</div><div class="ps" id="pageSub"></div></div>
      <div class="spacer"></div>
      <div class="search"><span id="searchIcon"></span><input placeholder="Cerca…"></div>
      <div class="envtog" id="envtog" onclick="toggleEnv()"><span class="d"></span><span id="envlabel">Produzione</span></div>
      <div class="envtog" id="liveTog" title="Origine dei dati"><span class="d" style="background:var(--text-3)"></span><span id="liveLabel">Dati locali</span></div>
      <div class="iconbtn" id="themeBtn" onclick="toggleTheme()"></div>
      <div class="iconbtn" id="bellBtn"></div>
      <button class="btn" id="newBtn"></button>
    </div>
    <div class="sbxbanner" id="sbxbanner"></div>
    <div class="content"><div class="view" id="content"></div></div>
  </div>
</div>

<div id="loginScreen">
  <div class="loginCard">
    <div class="loginLogo"><div class="logo"><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg></div><b>NovaCRM</b></div>
    <h2>Accedi al tuo CRM</h2>
    <div class="lsub">Entra nel tuo workspace o prova la demo.</div>
    <button class="btn ghost lbtn" onclick="googleLogin()" style="gap:10px;margin-top:0"><svg width="17" height="17" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.6 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.6 4.5 24 4.5 16.3 4.5 9.7 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 34.6 26.7 35.5 24 35.5c-5.3 0-9.7-3.1-11.3-7.5l-6.5 5C9.6 39 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.2 36.5 43.5 30.9 43.5 24c0-1.2-.1-2.3-.4-3.5z"/></svg>Continua con Google</button>
    <div class="ldiv"><span>oppure con email</span></div>
    <div class="ff"><label>Email</label><input id="l_email" type="email" value="demo@novacrm.it" autocomplete="username"></div>
    <div class="ff"><label>Password</label><input id="l_pwd" type="password" value="Demo1234!" autocomplete="current-password"></div>
    <div id="l_msg" class="lmsg"></div>
    <button class="btn lbtn" onclick="doLogin()">Accedi</button>
    <div class="ldiv"><span>oppure</span></div>
    <button class="btn ghost lbtn" onclick="demoMode()">Entra in modalità demo</button>
    <div class="lhint">Accesso riservato, solo su invito.<br>Demo: demo@novacrm.it · Demo1234!</div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script>
/* ===== ICON SET (Feather-style) ===== */
const ICONS={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  building:'<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/>',

function renderSidebar(){
  document.getElementById('logo').innerHTML=icon('target');
  document.getElementById('chevIcon').innerHTML=icon('chevron');
  document.getElementById('searchIcon').innerHTML=icon('search');
  document.getElementById('bellBtn').innerHTML=icon('bell');
  document.getElementById('logoutBtn').innerHTML=icon('logout');
  document.getElementById('newBtn').innerHTML=icon('plus')+'Nuovo';
  syncThemeBtn();
  document.getElementById('sbxbanner').innerHTML=icon('warn')+'<span>Modalità Sandbox attiva — stai lavorando su una copia di test. Le modifiche non toccano i dati reali.</span>';
  let h='';
  const groups=[];
  // Shell a moduli: solo in modalità auth con i moduli del tenant caricati.
  // In demo (o se i moduli non sono disponibili) si mostra tutto il CRM come prima.
  const moduleShell = (mode==='auth' && Array.isArray(myModules));
  if(moduleShell){
    const enabled = myModules; // es. ['crm','calendar',...]
    // Gruppo "Moduli": una voce per ogni modulo NON-CRM abilitato (apre un placeholder).
    // Il CRM, se abilitato, viene rappresentato direttamente dai suoi silos (i gruppi NAV).
    const modItems = MODULES.filter(m=>m.key!=='crm' && enabled.includes(m.key))
      .map(m=>['mod_'+m.key, m.ic, m.label]);
    if(modItems.length) groups.push({g:'Moduli', items:modItems});
    // Se il CRM è abilitato, mostra le sue viste (i silos esistenti: vendite, marketing, ecc.).
    if(enabled.includes('crm')) NAV.forEach(grp=>groups.push(grp));
    // Nessun modulo abilitato del tutto.
    if(!modItems.length && !enabled.includes('crm')) groups.push({g:'Moduli', items:[['mod_none','info','Nessun modulo']]});
  }else{
    NAV.forEach(grp=>groups.push(grp));
  }
  if(isSuperadmin())groups.push({g:'Amministrazione',items:[['superadmin','shield','Superadmin']]});
  groups.forEach(grp=>{
    h+=`<div class="navgroup">${grp.g}</div>`;
    grp.items.forEach(it=>{
      const [v,ic,lbl,badge]=it;
      let b='';
      if(badge==='2a')b='<span class="badge amb">2</span>';else if(badge)b=`<span class="badge">${badge}</span>`;
      h+=`<div class="navitem ${v===current?'active':''}" data-view="${v}">${icon(ic)}<span class="lbl">${lbl}</span>${b}</div>`;
    });
  });
  document.getElementById('nav').innerHTML=h;
}

function render(view){
  const modKey = view && view.indexOf('mod_')===0 ? view.slice(4) : null;
  document.getElementById('pageTitle').textContent=TITLES[view] || (modKey&&MODULE_LABEL[modKey]) || (modKey==='none'?'Moduli':'Dashboard');
  document.getElementById('pageSub').textContent=SUBS[view] || (modKey&&modKey!=='none'?'Modulo del tuo workspace':'');
  const wrap=document.querySelector('.content');
  const c=document.getElementById('content');
  c.classList.remove('view');void c.offsetWidth;c.classList.add('view');
  if(orgIdx!==0){c.innerHTML=tenantEmpty();return;}
  const VIEWS={dashboard:vDashboard,contatti:vContatti,aziende:vAziende,trattative:vTrattative,attivita:vAttivita,calendario:vCalendario,email:vEmail,messaggi:vMessaggi,chiamate:vChiamate,social:vSocial,webform:vWebform,campagne:vCampagne,sequenze:vSequenze,workflow:vWorkflow,blueprint:vBlueprint,ticket:vTicket,knowledge:vKnowledge,centro:vCentro,report:vReport,moduli:vModuli,ruoli:vRuoli,audit:vAudit,marketplace:vMarketplace,mobile:vMobile,organizzazione:vOrg,pagine:vPagine,superadmin:vSuperadmin,
    mod_calendar:vModCalendar,mod_email:vModEmail,mod_signature:vSignature,mod_segretario:vSegretario,mod_energia:vEnergia,mod_wealthview:vModPlaceholder,mod_none:vNoModule,
    mod_social:vModSocial,mod_campaigns:vModCampaigns,mod_sequences:vModSequences,mod_workflows:vModWorkflows,mod_desk:vModDesk,mod_webforms:vModWebforms,mod_messaging:vModMessaging,mod_calls:vModCalls,mod_agent:vModAgent,mod_voice:vModVoice};
  const fn=VIEWS[view]||vDashboard;
  c.innerHTML=fn(view);
  if(view==='trattative')wireDnd();
  if(view==='email')wireMail();
  if(view==='messaggi')wireChat();
  if(view==='pagine'){if(window.wirePagine)window.wirePagine();if(window.pgMaybeLoadBackend)window.pgMaybeLoadBackend();}
  if(view==='organizzazione'&&window.wireOrg)window.wireOrg();
  if(view==='superadmin'&&window.wireSuperadmin)window.wireSuperadmin();
  if(view==='attivita')wireAtt();
  if(view==='mod_segretario'&&window.segLoad)window.segLoad();
  if(view==='mod_signature'&&window.signLoad)window.signLoad();
  if(MODLOADERS[view])MODLOADERS[view]();
}

  const chips=(vals,cur,attr)=>`<span class="org-chip ${cur===null?'on':''}" data-${attr}="">Tutte</span>`+vals.map(v=>`<span class="org-chip ${cur===v?'on':''}" data-${attr}="${esc(v)}">${esc(v)}</span>`).join('');
  return note('<b>Attività per area strategica e canale marketing.</b> Filtra le attività da fare per area di business e per canale di acquisizione.')+
  `<div class="card"><div class="org-filterbar"><div class="org-chiprow"><span class="org-chiplbl">${icon('building')} Area</span>${chips(areas,attF.area,'att-area')}</div><div class="org-chiprow"><span class="org-chiplbl">${icon('share')} Canale</span>${chips(canali,attF.canale,'att-canale')}</div></div>

/* ===== CONTATTO: dettaglio reale (descrizione + registro attività) ===== */
function contactErr(e){const m=(e&&e.message?e.message:String(e))||'';if(/negato|denied|permess/i.test(m)){toast('Permesso negato');}else{toast('Errore: '+m);}}
function fmtDate(s){if(!s)return '';const d=new Date(s);if(isNaN(d))return '';const p=n=>String(n).padStart(2,'0');return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear();}
function actIcon(t){return {call:'phone',meeting:'users',note:'message',email:'mail'}[t]||'check';}
function actLabel(t){return {call:'Call',meeting:'Incontro',note:'Nota',email:'Email'}[t]||esc(t);}
async function contactLoadDetail(id){
  // Descrizione
  try{
    const rows=await rpc('crm_contact_get',{p_contact:id});
    const row=Array.isArray(rows)?rows[0]:rows;
    const desc=row?(row.description||''):'';
    const box=document.getElementById('ctDesc');
    if(box)box.innerHTML=`<textarea id="ctDescTa" rows="4" style="width:100%;resize:vertical;font:inherit;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text)">${esc(desc)}</textarea>
      <button class="btn sm" style="margin-top:8px" onclick="contactSaveDescription('${esc(id)}')">${icon('check')}Salva descrizione</button>`;
  }catch(e){const box=document.getElementById('ctDesc');if(box)box.innerHTML='<div style="color:var(--text-3);font-size:13px">Descrizione non disponibile</div>';contactErr(e);}
  // Attività
  await contactRenderActivities(id);
}
async function contactRenderActivities(id){
  const box=document.getElementById('ctActs');if(!box)return;
  let timeline='<div style="color:var(--text-3);font-size:13px">Caricamento…</div>';
  try{
    const data=await rpc('crm_activities_for_contact',{p_contact:id});
    const rows=Array.isArray(data)?data:(data?[data]:[]);
    if(!rows.length){
      timeline='<div style="color:var(--text-3);font-size:13px">Nessuna attività registrata.</div>';
    }else{
      timeline=rows.map(a=>{
        const t=a.type||'note';const when=fmtDate(a.due_at||a.created_at);
        const del=`<span title="Elimina" style="cursor:pointer;color:var(--red);font-size:15px;line-height:1" onclick="contactDeleteActivity('${esc(a.id)}','${esc(id)}')">×</span>`;
        return `<div class="field" style="align-items:flex-start"><span style="display:flex;align-items:center;gap:7px;min-width:0">${icon(actIcon(t))}<span style="min-width:0"><b style="display:block">${esc(a.subject||actLabel(t))}</b>${a.notes?`<span style="color:var(--text-3);font-size:12.5px;display:block;white-space:pre-wrap">${esc(a.notes)}</span>`:''}<span style="color:var(--text-3);font-size:11.5px">${actLabel(t)}${when?' · '+when:''}</span></span></span>${del}</div>`;
      }).join('');
    }
  }catch(e){timeline='<div style="color:var(--text-3);font-size:13px">Attività non disponibili</div>';contactErr(e);}
  // Form aggiungi attività
  const form=`<div class="sechead" style="margin-top:14px">Aggiungi attività</div>
    <div class="ff"><label>Tipo</label><select id="ctAType"><option value="call">Call</option><option value="meeting">Incontro</option><option value="note">Nota</option><option value="email">Email</option></select></div>
    <div class="ff"><label>Oggetto *</label><input id="ctASubj" placeholder="es. Call di follow-up"></div>
    <div class="ff"><label>Descrizione / Note</label><textarea id="ctANotes" rows="3" style="resize:vertical"></textarea></div>
    <div class="ff"><label>Data (opzionale)</label><input id="ctADate" type="date"></div>
    <div id="ctAMsg" style="font-size:12.5px;color:var(--red);margin:0 0 8px"></div>
    <button class="btn sm" onclick="contactAddActivity('${esc(id)}')">${icon('plus')}Registra attività</button>`;
  box.innerHTML=timeline+form;
}
async function contactSaveDescription(id){
  const ta=document.getElementById('ctDescTa');if(!ta)return;
  try{await rpc('crm_set_description',{p_entity:'contacts',p_id:id,p_description:ta.value});toast('Descrizione salvata');}
  catch(e){contactErr(e);}
}
async function contactAddActivity(id){
  const subj=gv('ctASubj');const msg=document.getElementById('ctAMsg');
  if(!subj){if(msg)msg.textContent='L\'oggetto è obbligatorio.';return;}
  if(msg)msg.textContent='';
  const type=gv('ctAType')||'note';const notes=gv('ctANotes');const date=gv('ctADate');
  try{
    await rpc('crm_add_activity',{p_subject:subj,p_type:type,p_notes:notes,p_due_at:date||null,p_contact:id,p_deal:null});
    toast('Attività registrata');
    await contactRenderActivities(id);
  }catch(e){contactErr(e);}
}
async function contactDeleteActivity(actId,contactId){
  if(!confirm('Eliminare questa attività?'))return;
  try{await rpc('crm_delete_activity',{p_id:actId});toast('Attività eliminata');await contactRenderActivities(contactId);}
  catch(e){contactErr(e);}
}

let mode='demo', token=SUPA.key, live=false, appStarted=false;
async function rpc(fn,args){
  const r=await fetch(SUPA.url+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:SUPA.key,Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(args||{})});
  if(!r.ok)throw new Error('HTTP '+r.status+' — '+(await r.text()));
  const t=await r.text();return t?JSON.parse(t):null;
}
/* Chiama una edge function Supabase. Restituisce il JSON di risposta o lancia. */
async function edgeFn(name,body){const r=await fetch(SUPA.url+'/functions/v1/'+name,{method:'POST',headers:{apikey:SUPA.key,Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body||{})});const t=await r.text();let d;try{d=t?JSON.parse(t):null;}catch(e){d={raw:t};} if(!r.ok)throw new Error((d&&(d.error||d.message))||('HTTP '+r.status)); return d;}
/* Vero se l'errore indica che l'integrazione richiede ancora configurazione (501/credenziali OAuth). */
function edgeNotReady(e){const m=(e&&e.message?e.message:String(e))||'';return /501|configur|credenz|not.?implement|missing|non.?disponibil/i.test(m);}
async function authApi(path,body){
  const r=await fetch(SUPA.url+'/auth/v1/'+path,{method:'POST',headers:{apikey:SUPA.key,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error_description||d.msg||d.error||('HTTP '+r.status));
  return d;
}
function toast(t){let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:300;opacity:0;transition:.25s';document.body.appendChild(el);}el.textContent=t;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',1900);}
function applyData(d){
  // Tutti i campi testuali provenienti dal database vengono escapati qui:
  // ogni vista legge da DATA, quindi questo blocca la XSS in tutte le sezioni.
  // Nota: l'eventuale campo `id` (uuid del record) viene preservato così com'è
  // (non è testo da mostrare) per consentire update/delete. Se `crm_me` non lo
  // espone, `id` sarà undefined e i pulsanti elimina non verranno mostrati.
  if(d.aziende)DATA.aziende=d.aziende.map(a=>({...a,id:a.id,n:esc(a.n),sett:esc(a.sett),citta:esc(a.citta)}));
  if(d.contatti)DATA.contatti=d.contatti.map(c=>({...c,id:c.id,n:esc(c.n),az:esc(c.az),ruolo:esc(c.ruolo),email:esc(c.email),tel:esc(c.tel)}));
  if(d.stages&&d.stages.length)DATA.stages=d.stages.map(s=>({id:s.id,nome:esc(s.nome)}));
  if(d.deals)DATA.deals=d.deals.map(x=>({...x,n:esc(x.n),az:esc(x.az),ref:esc(x.ref)}));
  if(d.attivita){const cols=['#4f46e5','#d97706','#0d9488','#15a34a','#9097a3'];DATA.attivita=d.attivita.map((a,i)=>({id:a.id,t:esc(a.t),s:esc(a.s||''),when:'',c:cols[i%cols.length],area:a.area?esc(a.area):null,canale:a.canale?esc(a.canale):null}));}
  if(d.email){DATA.email=d.email.map((m,i)=>({from:esc(m.from||m.addr),addr:esc(m.addr),sub:esc(m.sub),time:'',unread:i===0,link:'Contatto: '+esc(m.from||m.addr),ai:(m.ai||'').split('; ').filter(Boolean).map(esc),body:esc(m.body||'')}));}
}
async function loadData(){
  const tog=document.getElementById('liveTog'),lab=document.getElementById('liveLabel');
  try{
    lab.textContent='Connessione…';
    let d;
    if(mode==='auth'){
      d=await rpc('crm_me'); if(!d||!d.org){ noAccess(); return; }
      await loadMyModules();
    }
    else { d=await rpc('crm_demo'); }
    applyData(d);
    live=true;
    pgBackendLoaded=false; // forza il ricaricamento delle Pagine dal backend al prossimo ingresso
    lab.textContent=(mode==='auth'?'Live · ':'Demo · ')+(d.org||'Supabase');
    tog.classList.add('sbx');tog.style.borderColor='var(--green)';tog.style.color='var(--green)';tog.querySelector('.d').style.background='var(--green)';
    render(current);
  }catch(e){
    live=false;
    if(mode==='auth' && /HTTP 401/.test(e.message||'')){ noAccess(); return; }
    lab.textContent='Dati locali (offline)';
    console.warn('Supabase non raggiungibile, uso i dati di esempio integrati:',e.message);
  }
}
/* --- Moduli del tenant dell'utente (shell a moduli) --- */
async function loadMyModules(){
  try{
    const data=await rpc('crm_my_modules',{});
    const rows=Array.isArray(data)?data:(data?[data]:[]);
    // Tiene solo i moduli effettivamente abilitati, nell'ordine del catalogo.
    const enabledSet=new Set(rows.filter(r=>r&&(r.enabled===undefined||r.enabled)).map(r=>String(r.module)));
    myModules=MODULE_ORDER.filter(k=>enabledSet.has(k));
  }catch(e){
    // In caso di errore non blocchiamo l'app: mostriamo comunque il CRM completo.
    console.warn('crm_my_modules non disponibile, mostro il CRM completo:',e.message);
    myModules=null;
  }
  // Ricostruisce il menu in base ai moduli abilitati.
  if(appStarted)renderSidebar();
  // Se la vista corrente non è raggiungibile, vai alla prima voce disponibile.
  if(Array.isArray(myModules)){
    const reachable=new Set();
    if(myModules.includes('crm')){ NAV.forEach(g=>g.items.forEach(it=>reachable.add(it[0]))); }
    myModules.forEach(k=>{ if(k!=='crm')reachable.add('mod_'+k); });
    if(isSuperadmin())reachable.add('superadmin');
    if(!myModules.length)reachable.add('mod_none');
    if(!reachable.has(current)){
      current = myModules.includes('crm') ? 'dashboard'
              : (myModules.length ? 'mod_'+myModules.find(k=>k!=='crm') : 'mod_none');
      document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active',n.dataset.view===current));
    }
  }
}

async function deleteRecord(table,id,label){
  if(!(live && mode==='auth')){toast('Cancellazione disponibile solo in modalità collegata');return;}
  if(!id){toast('ID non disponibile per questo record');return;}
  if(!confirm('Eliminare '+(label||'questo record')+'? L\'operazione non è reversibile.'))return;
  try{
    await rpc('crm_delete_record',{p_table:table,p_id:id});
    await loadData();render(current);toast('Record eliminato');
  }catch(e){
    const m=e&&e.message?e.message:String(e);
    toast(/admin|permess|denied|negato/i.test(m)?'Permesso negato: solo admin può eliminare':('Errore: '+m));
  }
}

/* ===== Pagine: backend Supabase (modalità auth) =====
   In modalità collegata l'albero, le pagine e i blocchi sono persistiti via RPC.
   In demo/offline si mantiene il modello in-memory `PG` originale. */
function pgBackendOn(){return live && mode==='auth';}
let pgLoading=false;
/* Mappa il tipo di blocco DB -> tipo di rendering interno. */
const PG_DBTYPE_TO_UI={paragraph:'text',heading:'heading',todo:'todo',bullet:'bullet',numbered:'bullet',divider:'divider',quote:'quote',code:'code',image:'image'};
const PG_UI_TO_DBTYPE={text:'paragraph',heading:'heading',todo:'todo',bullet:'bullet'};
function pgBlockText(content){if(content==null)return '';if(typeof content==='string'){try{content=JSON.parse(content);}catch(e){return content;}}return content&&typeof content==='object'?(content.text||''):String(content);}
function pgBlockDone(content){if(typeof content==='string'){try{content=JSON.parse(content);}catch(e){return false;}}return !!(content&&typeof content==='object'&&(content.checked||content.done));}
/* Carica l'albero delle pagine dal DB nel modello `PG`. Conserva la selezione/apertura correnti dove possibile. */
async function pgLoadTree(){
  const rows=await rpc('crm_pages_list',{})||[];
  const prevOpen={};Object.values(PG.pages).forEach(p=>{prevOpen[p.id]=!!p.open;});
  const pages={};const rootOrder=[];
  rows.slice().sort((a,b)=>(a.position||0)-(b.position||0)).forEach(r=>{
    const id=String(r.id);
    pages[id]={id,parent:r.parent_id?String(r.parent_id):null,title:r.title||'Senza titolo',emoji:r.icon||'📄',position:r.position||0,open:prevOpen[id]!==undefined?prevOpen[id]:true,blocks:(PG.pages[id]&&PG.pages[id].blocks)||[]};
    if(!r.parent_id)rootOrder.push(id);
  });
  PG.pages=pages;PG.rootOrder=rootOrder;
  if(!PG.pages[PG.current])PG.current=rootOrder[0]||null;
}
/* Carica i blocchi della pagina corrente dal DB. */
async function pgLoadPage(pid){
  if(!pid)return;
  const res=await rpc('crm_page_get',{p_id:pid});
  if(!res||!res.page){return;}
  const pg=res.page;const id=String(pg.id);
  if(PG.pages[id]){PG.pages[id].title=pg.title||'Senza titolo';PG.pages[id].emoji=pg.icon||'📄';PG.pages[id].parent=pg.parent_id?String(pg.parent_id):null;}
  const blocks=(res.blocks||[]).slice().sort((a,b)=>(a.position||0)-(b.position||0)).map(b=>({
    id:String(b.id),
    dbtype:b.type,
    type:PG_DBTYPE_TO_UI[b.type]||'text',
    text:pgBlockText(b.content),
    done:pgBlockDone(b.content),
    position:b.position||0
  }));
  if(PG.pages[id])PG.pages[id].blocks=blocks;
}
/* Entrata nella vista Pagine in modalità auth: carica tutto e ridisegna. */
async function pgEnterBackend(){
  if(pgLoading)return;pgLoading=true;
  try{
    await pgLoadTree();
    if(PG.current)await pgLoadPage(PG.current);
  }catch(e){
    toast('Errore caricamento pagine: '+(e&&e.message?e.message:e));
  }finally{pgLoading=false;render('pagine');}
}

function pgChildren(pid){return Object.values(PG.pages).filter(p=>p.parent===pid);}
function pgTreeRows(pid,depth){let out='';pgChildren(pid).forEach(p=>{const kids=pgChildren(p.id);const hasKids=kids.length>0;const active=p.id===PG.current?' nz-tree-active':'';const chev=hasKids?`<span class="nz-tw" data-pgtoggle="${esc(p.id)}">${icon('chevron')}</span>`:`<span class="nz-tw nz-tw-empty"></span>`;out+=`<div class="nz-treerow${active}" data-pgopen="${esc(p.id)}" style="padding-left:${8+depth*16}px"><span class="nz-chev ${p.open?'nz-chev-open':''}">${chev}</span><span class="nz-emoji">${esc(p.emoji||'📄')}</span><span class="nz-tt">${esc(p.title)}</span><span class="nz-addchild" data-pgadd="${esc(p.id)}" title="Aggiungi sottopagina">${icon('plus')}</span></div>`;if(hasKids&&p.open){out+=pgTreeRows(p.id,depth+1);}});return out;}

  case 'quote':return `<div class="nz-block" data-bid="${esc(b.id)}"><div class="nz-ptext" contenteditable="true" data-edit="text" data-bid="${esc(b.id)}" style="border-left:3px solid var(--border);padding-left:12px;color:var(--text-2);font-style:italic">${esc(b.text)}</div>${pgBlockMenu(b.id)}</div>`;
  case 'code':return `<div class="nz-block" data-bid="${esc(b.id)}"><div class="code" contenteditable="true" data-edit="text" data-bid="${esc(b.id)}" style="outline:none">${esc(b.text)}</div>${pgBlockMenu(b.id)}</div>`;

  case 'db':return pgRenderDB(b); default:return '';}}
function pgBlockMenu(bid){return `<span class="nz-bdel" data-pgdel="${esc(bid)}" title="Elimina blocco">×</span>`;}
function pgRenderDB(b){const isTable=b.view==='table';let body;if(isTable){body=`<div class="tablecard nz-dbtable"><table><thead><tr>${b.cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${b.rows.map(r=>`<tr>${r.cells.map((cell,ci)=>{if(ci===b.statusCol){const cls=PG_STATUS[cell]||'plain';return `<td><span class="pill ${cls}">${esc(cell)}</span></td>`;}if(b.cols[ci]&&/valore|importo|prezzo/i.test(b.cols[ci])&&cell!==''){return `<td>${esc(eur(Number(cell)||0))}</td>`;}return `<td>${esc(cell)}</td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;}else{const groups={};PG_STATUS_LIST.forEach(s=>groups[s]=[]);b.rows.forEach(r=>{const s=r.cells[b.statusCol];if(!groups[s])groups[s]=[];groups[s].push(r);});body=`<div class="kanban nz-board">${Object.keys(groups).map(s=>{const cls=PG_STATUS[s]||'plain';return `<div class="kcol nz-kcol"><div class="nz-khead"><span class="pill ${cls}">${esc(s)}</span><span class="nz-kcount">${groups[s].length}</span></div>${groups[s].map(r=>`<div class="deal nz-card"><div class="nz-cardtitle">${esc(r.cells[0])}</div><div class="nz-cardsub">${esc(r.cells[1]||'')}</div>${r.cells[3]!==undefined&&r.cells[3]!==''?`<div class="nz-cardval">${esc(eur(Number(r.cells[3])||0))}</div>`:''}</div>`).join('')}</div>`;}).join('')}</div>`;}return `<div class="nz-block nz-db" data-bid="${esc(b.id)}"><div class="nz-dbbar"><span class="nz-dblabel">${icon('grid')} Database</span><div class="tabs nz-dbtabs"><span class="tab ${isTable?'active':''}" data-pgview="${esc(b.id)}|table">${icon('list')} Tabella</span><span class="tab ${!isTable?'active':''}" data-pgview="${esc(b.id)}|board">${icon('grid')} Board</span></div><span class="nz-bdel" data-pgdel="${esc(b.id)}" title="Elimina blocco">×</span></div>${body}</div>`;}
function vPagine(){const p=PG.pages[PG.current]||PG.pages[PG.rootOrder[0]];
  if(!p){return `<div class="nz-wrap"><aside class="nz-side card"><div class="nz-sidehead"><span class="nz-sidetitle">${icon('book')} Pagine</span><span class="btn ghost sm nz-newroot" data-pgaddroot="1">${icon('plus')} Nuova</span></div><div class="nz-tree"></div></aside><section class="nz-editor card"><div class="nz-empty">Nessuna pagina. Crea la prima pagina con "Nuova".</div></section></div>`;}

function wirePagine(){const root=document.querySelector('.nz-wrap');if(!root)return;const backend=pgBackendOn();

  root.querySelectorAll('[data-pgcheck]').forEach(el=>el.addEventListener('click',()=>{const b=pgFindBlock(el.getAttribute('data-pgcheck'));if(b){b.done=!b.done;render('pagine');if(backend)pgSaveBlock(b.id,true);}}));

  root.querySelectorAll('[data-pgview]').forEach(el=>el.addEventListener('click',()=>{const[bid,view]=el.getAttribute('data-pgview').split('|');const b=pgFindBlock(bid);if(b){b.view=view;render('pagine');}}));

    el.addEventListener('input',()=>{const kind=el.getAttribute('data-edit');if(kind==='text'){const b=pgFindBlock(el.getAttribute('data-bid'));if(b){b.text=el.innerText;if(backend)pgSaveBlock(b.id,false);}}});

    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });

function pgFindBlock(bid){return (PG.pages[PG.current].blocks||[]).find(b=>b.id===bid);}
async function pgNewPage(parent){
  if(pgBackendOn()){
    try{
      const siblings=Object.values(PG.pages).filter(p=>p.parent===(parent||null));
      const pos=siblings.length;
      const newId=await rpc('crm_page_create',{p_title:'Senza titolo',p_icon:'📄',p_parent:parent||null,p_position:pos});
      if(parent&&PG.pages[parent])PG.pages[parent].open=true;
      await pgLoadTree();
      if(newId)PG.current=String(newId);
      await pgLoadPage(PG.current);
      render('pagine');toast('Pagina creata');
    }catch(e){toast('Errore creazione pagina: '+(e&&e.message?e.message:e));}
    return;
  }
  const id=pgUid('pg_');PG.pages[id]={id,parent,title:'Senza titolo',emoji:'📄',open:false,blocks:[{id:pgUid('b_'),type:'text',text:''}]};if(parent===null)PG.rootOrder.push(id);else PG.pages[parent].open=true;PG.current=id;render('pagine');
}
async function pgNewBlock(type){
  const p=PG.pages[PG.current];if(!p)return;
  if(pgBackendOn()){
    const dbtype=PG_UI_TO_DBTYPE[type]||'paragraph';
    const defText=type==='heading'?'Nuovo titolo':type==='todo'?'Nuova attività':type==='bullet'?'Voce elenco':'';
    const content=type==='todo'?{text:defText,checked:false}:{text:defText};
    try{
      const pos=(p.blocks||[]).length;
      await rpc('crm_block_upsert',{p_id:null,p_page:p.id,p_type:dbtype,p_content:content,p_position:pos});
      await pgLoadPage(p.id);render('pagine');
    }catch(e){toast('Errore creazione blocco: '+(e&&e.message?e.message:e));}
    return;
  }
  let b;if(type==='heading')b={id:pgUid('b_'),type:'heading',text:'Nuovo titolo'};else if(type==='todo')b={id:pgUid('b_'),type:'todo',text:'Nuova attività',done:false};else if(type==='bullet')b={id:pgUid('b_'),type:'bullet',text:'Voce elenco'};else if(type==='db')b={id:pgUid('b_'),type:'db',view:'table',cols:['Nome','Cliente','Stato','Valore'],statusCol:2,rows:[{id:pgUid('r_'),cells:['Nuovo record','—','Da contattare','0']}]};else b={id:pgUid('b_'),type:'text',text:''};p.blocks.push(b);render('pagine');
}
/* --- Persistenza blocchi (backend) con debounce sull'edit --- */
const pgSaveTimers={};
function pgSaveBlock(bid,immediate){
  if(!pgBackendOn())return;
  const b=pgFindBlock(bid);if(!b)return;
  const doSave=async()=>{
    try{
      const content=b.type==='todo'?{text:b.text||'',checked:!!b.done}:{text:b.text||''};
      await rpc('crm_block_upsert',{p_id:b.id,p_page:PG.current,p_type:b.dbtype||PG_UI_TO_DBTYPE[b.type]||'paragraph',p_content:content,p_position:b.position||0});
    }catch(e){toast('Errore salvataggio blocco: '+(e&&e.message?e.message:e));}
  };
  if(immediate){clearTimeout(pgSaveTimers[bid]);doSave();return;}
  clearTimeout(pgSaveTimers[bid]);
  pgSaveTimers[bid]=setTimeout(doSave,700);
}
async function pgDeleteBlockBackend(bid){
  try{await rpc('crm_block_delete',{p_id:bid});await pgLoadPage(PG.current);render('pagine');}
  catch(e){toast('Errore eliminazione blocco: '+(e&&e.message?e.message:e));}
}
async function pgDeletePageBackend(pid){
  try{
    await rpc('crm_page_delete',{p_id:pid});
    const wasCurrent=PG.current===pid;
    await pgLoadTree();
    if(wasCurrent)PG.current=PG.rootOrder[0]||null;
    if(PG.current)await pgLoadPage(PG.current);
    render('pagine');toast('Pagina eliminata');
  }catch(e){toast('Errore eliminazione pagina: '+(e&&e.message?e.message:e));}
}
async function pgUpdatePageMeta(pid){
  const p=PG.pages[pid];if(!p||!pgBackendOn())return;
  try{await rpc('crm_page_update',{p_id:p.id,p_title:p.title||'Senza titolo',p_icon:p.emoji||'📄',p_parent:p.parent||null,p_position:p.position||0});}
  catch(e){toast('Errore salvataggio pagina: '+(e&&e.message?e.message:e));}
}

const SEG={ filter:'all', items:[], tab:'panoramica' };
const SEG_TABS=[['panoramica','Panoramica'],['scadenzario','Scadenzario'],['anagrafica','Anagrafica'],['imu','IMU'],['locazioni','Affitti/Locazioni'],['f24','F24'],['dichiarazioni','730/Dichiarazioni'],['forfettari','Forfettari'],['semplificato','Semplificato'],['inps','INPS'],['inail','INAIL'],['condominio','Condominio'],['firma','Firma digitale']];
function segSetTab(t){if(t==='firma'){segGoSignature();return;}SEG.tab=t;render('mod_segretario');}
function segGoSignature(){current='mod_signature';document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active',n.dataset.view==='mod_signature'));render('mod_signature');}
function segPermErr(e){const m=segErr(e);return /admin|permess|denied|negato|insufficient/i.test(m)?'Permesso negato':m;}
const SEG_REC={none:'Nessuna',monthly:'Mensile',quarterly:'Trimestrale',semiannual:'Semestrale',yearly:'Annuale',custom:'Personalizzata'};
function segRecLbl(r){return SEG_REC[r]||esc(r||'Nessuna');}
function segErr(e){return e&&e.message?e.message:String(e);}
/* Giorni mancanti alla scadenza (negativo = già scaduta) */
function segDaysLeft(due){
  if(!due)return null;
  const d=new Date(due+'T00:00:00');const now=new Date();now.setHours(0,0,0,0);
  if(isNaN(d))return null;
  return Math.round((d-now)/86400000);
}
function segDueBadge(due,status){
  const dl=segDaysLeft(due);
  if(status==='done')return '<span class="pill grn">Fatta</span>';
  if(dl===null)return '<span class="pill cold">—</span>';
  if(dl<0)return `<span class="pill red">Scaduta · ${esc(String(-dl))}g fa</span>`;
  if(dl===0)return '<span class="pill amb">Scade oggi</span>';
  if(dl<=7)return `<span class="pill amb">Tra ${esc(String(dl))}g</span>`;
  return `<span class="pill cold">Tra ${esc(String(dl))}g</span>`;
}

window.segLoad=async function(){
  if(mode!=='auth')return;
  if(SEG.tab==='panoramica'){ if(window.segLoadPanoramica)window.segLoadPanoramica(); return; }
  if(SEG.tab!=='scadenzario'){ if(window.segTabLoad)window.segTabLoad(); return; }
  const el=document.getElementById('segList');if(!el)return;
  el.innerHTML='<div class="empty">Caricamento…</div>';
  const pStatus = SEG.filter==='open' ? 'open' : null; // 'fatte' e 'tutte' filtrate lato client
  try{
    const data=await rpc('seg_deadlines_list',{p_status:pStatus});
    let items=Array.isArray(data)?data:(data?[data]:[]);
    if(SEG.filter==='done')items=items.filter(x=>x.status==='done');
    // Ordina: prima le aperte per data di scadenza crescente, poi le fatte.
    items.sort((a,b)=>{
      const ad=a.status==='done'?1:0, bd=b.status==='done'?1:0;
      if(ad!==bd)return ad-bd;
      return String(a.due_date||'').localeCompare(String(b.due_date||''));
    });
    SEG.items=items;
    el.innerHTML=segRows(items);
  }catch(e){
    el.innerHTML=`<div class="empty">Impossibile caricare lo scadenzario.</div>`;
    toast('Errore: '+segErr(e));
  }
};
function segRows(items){
  if(!items.length)return '<div class="empty">Nessuna scadenza per questo filtro.</div>';
  const rows=items.map(it=>{
    const id=esc(String(it.id||''));
    const done=it.status==='done';
    const notify=Array.isArray(it.notify_days)?it.notify_days.join(', '):'';
    const doneBtn=done?'':`<button class="btn ghost sm" title="Segna fatta" onclick="event.stopPropagation();segDone('${id}','${esc(it.recurrence||'none')}')" style="color:var(--green)">${icon('check')}</button>`;
    const delBtn=`<button class="btn ghost sm" title="Elimina" onclick="event.stopPropagation();segDelete('${id}','${esc(it.title||'')}')" style="color:var(--red)">${icon('warn')}</button>`;
    return `<tr>
      <td><b>${esc(it.title||'—')}</b>${it.description?`<div style="color:var(--text-3);font-size:12px;margin-top:2px">${esc(it.description)}</div>`:''}</td>
      <td>${it.category?`<span class="pill blu plain" style="font-size:11px">${esc(it.category)}</span>`:'<span style="color:var(--text-3)">—</span>'}</td>
      <td>${esc(it.due_date||'—')}</td>
      <td><span class="pill cold" style="font-size:11px">${segRecLbl(it.recurrence)}</span></td>
      <td>${segDueBadge(it.due_date,it.status)}</td>
      <td style="color:var(--text-3);font-size:12px">${notify?esc(notify):'—'}</td>
      <td style="text-align:right;white-space:nowrap">${doneBtn} ${delBtn}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr><th>Scadenza</th><th>Categoria</th><th>Data</th><th>Ricorrenza</th><th>Stato</th><th>Promemoria</th><th style="text-align:right">Azioni</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function segParseNotify(raw){
  return String(raw||'').split(',').map(s=>parseInt(s.trim(),10)).filter(n=>Number.isFinite(n)&&n>=0);
}
async function segCreate(){
  const msg=document.getElementById('seg_msg');
  const title=gv('seg_title'), due=gv('seg_due');
  if(!title){msg.style.color='var(--red)';msg.textContent='Il titolo è obbligatorio.';return;}
  if(!due){msg.style.color='var(--red)';msg.textContent='La data di scadenza è obbligatoria.';return;}
  const notify=segParseNotify(gv('seg_notify'));
  const args={
    p_title:title,
    p_due_date:due,
    p_description:gv('seg_desc')||null,
    p_category:gv('seg_cat')||null,
    p_recurrence:gv('seg_rec')||'none',
    p_notify_days:notify.length?notify:[30,7,1]
  };
  try{
    msg.style.color='var(--text-3)';msg.textContent='Salvataggio…';
    await rpc('seg_deadline_create',args);
    toast('Scadenza creata');
    render('mod_segretario');
  }catch(e){
    msg.style.color='var(--red)';msg.textContent='Errore: '+segErr(e);
    toast('Errore: '+segErr(e));
  }
}
async function segDone(id,recurrence){
  if(!id)return;
  const rollover = recurrence && recurrence!=='none';
  try{
    const next=await rpc('seg_deadline_done',{p_id:id,p_rollover:rollover});
    toast(rollover&&next?'Fatta · creata la prossima occorrenza':'Scadenza completata');
    window.segLoad();
  }catch(e){toast('Errore: '+segErr(e));}
}
async function segDelete(id,label){
  if(!id)return;
  if(!confirm('Eliminare '+(label||'questa scadenza')+'? L\'operazione non è reversibile.'))return;
  try{
    await rpc('seg_deadline_delete',{p_id:id});
    toast('Scadenza eliminata');
    window.segLoad();
  }catch(e){
    const m=segErr(e);
    toast(/admin|permess|denied|negato/i.test(m)?'Solo un admin può eliminare le scadenze':('Errore: '+m));
  }
}

const SIGN={ filter:'all', items:[] };
const SIGN_STATUS={
  draft:['cold','Bozza'], sent:['blu','Inviata'], viewed:['amb','Visualizzata'],
  signed:['grn','Firmata'], declined:['red','Rifiutata'], expired:['red','Scaduta'], canceled:['cold','Annullata']

function signStatusBadge(s){const m=SIGN_STATUS[s];if(!m)return `<span class="pill cold">${esc(s||'—')}</span>`;return `<span class="pill ${m[0]}">${esc(m[1])}</span>`;}
function signFmtDate(d){if(!d)return '—';const dt=new Date(d);return isNaN(dt)?esc(String(d)):dt.toLocaleDateString('it-IT');}
function vSignature(){
  if(mode!=='auth'){
    return note('<b>Firma digitale — disponibile dopo l’accesso.</b> Accedi al tuo workspace per creare e gestire le richieste di firma. In modalità demo questa funzione non è attiva.');

function signSetFilter(f){SIGN.filter=f;render('mod_signature');}
window.signLoad=async function(){
  if(mode!=='auth')return;
  const el=document.getElementById('signList');if(!el)return;
  el.innerHTML='<div class="empty">Caricamento…</div>';
  const pStatus = (SIGN.filter==='all') ? null : SIGN.filter;
  try{
    const data=await rpc('seg_sign_list',{p_status:pStatus});
    let items=Array.isArray(data)?data:(data?[data]:[]);
    items.sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
    SIGN.items=items;
    el.innerHTML=signRows(items);
  }catch(e){
    el.innerHTML='<div class="empty">Impossibile caricare le richieste di firma.</div>';
    toast('Errore: '+segErr(e));
  }
};
function signRows(items){
  if(!items.length)return '<div class="empty">Nessuna richiesta di firma per questo filtro.</div>';
  const cancelable={draft:1,sent:1,viewed:1};
  const rows=items.map(it=>{
    const id=esc(String(it.id||''));
    const date=it.signed_at||it.sent_at||it.created_at;
    let actions='';
    if(it.status==='draft'){
      actions+=`<button class="btn sm" title="Invia per firma" onclick="event.stopPropagation();signSend('${id}')">${icon('send')}Invia</button> `;
    }
    if(cancelable[it.status]){
      actions+=`<button class="btn ghost sm" title="Annulla" onclick="event.stopPropagation();signCancel('${id}','${esc(it.title||'')}')" style="color:var(--red)">${icon('warn')}</button>`;
    }
    return `<tr>
      <td><b>${esc(it.title||'—')}</b>${it.provider?`<div style="color:var(--text-3);font-size:12px;margin-top:2px">${esc(it.provider)}</div>`:''}</td>
      <td>${esc(it.signer_name||'—')}<div style="color:var(--text-3);font-size:12px">${esc(it.signer_email||'')}</div></td>
      <td>${signStatusBadge(it.status)}</td>
      <td style="color:var(--text-3)">${signFmtDate(date)}</td>
      <td style="text-align:right;white-space:nowrap">${actions||'<span style="color:var(--text-3)">—</span>'}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr><th>Documento</th><th>Firmatario</th><th>Stato</th><th>Data</th><th style="text-align:right">Azioni</th></tr></thead><tbody>${rows}</tbody></table>`;
}
async function signCreate(){
  const msg=document.getElementById('sg_msg');
  const title=gv('sg_title'), name=gv('sg_name'), email=gv('sg_email');
  const url=gv('sg_url'), text=gv('sg_text');
  if(!title||!name||!email){msg.style.color='var(--red)';msg.textContent='Titolo, nome ed email del firmatario sono obbligatori.';return;}
  if(!url&&!text){msg.style.color='var(--red)';msg.textContent='Indica un URL documento oppure il testo del documento.';return;}
  try{
    msg.style.color='var(--text-3)';msg.textContent='Creazione bozza…';
    await rpc('seg_sign_create',{p_title:title,p_signer_name:name,p_signer_email:email,p_document_url:url||null,p_document_text:text||null});
    toast('Bozza di firma creata');
    render('mod_signature');
  }catch(e){
    msg.style.color='var(--red)';msg.textContent='Errore: '+segErr(e);
    toast('Errore: '+segErr(e));

/* Helper riusabile: shell lista + form per una scheda fiscale.
   cfg = {note, listId, head:[...], formTitle, fields:[{id,label,type,opts,ph,val}], onCreate} */
function segFiscalShell(cfg){
  const form=cfg.fields.map(f=>{
    if(f.type==='select'){
      return `<div class="ff"><label>${esc(f.label)}</label><select id="${f.id}">${f.opts.map(o=>`<option value="${esc(o[0])}">${esc(o[1])}</option>`).join('')}</select></div>`;
    }
    const t=f.type||'text';
    return `<div class="ff"><label>${esc(f.label)}</label><input id="${f.id}" type="${t}" ${f.val!==undefined?`value="${esc(f.val)}"`:''} placeholder="${esc(f.ph||'')}"></div>`;
  }).join('');
  return note(cfg.note)+
  `<div class="grid2" style="align-items:start">
    <div><div class="tablecard" id="${cfg.listId}"><div class="empty">Caricamento…</div></div></div>
    <div class="card">
      <h3>${esc(cfg.formTitle)}</h3>
      ${form}
      <div id="${cfg.listId}_msg" style="font-size:12.5px;color:var(--text-3);margin:6px 0 12px"></div>
      <button class="btn" onclick="${cfg.onCreate}()">${icon('plus')}Crea</button>
    </div>
  </div>`;
}
/* Render generico di una tabella per le schede fiscali. */
function segTable(rows,cols,delFn){
  if(!rows.length)return '<div class="empty">Nessun record.</div>';
  const head=cols.map(c=>`<th>${esc(c[1])}</th>`).join('')+'<th style="text-align:right">Azioni</th>';
  const body=rows.map(r=>{
    const id=esc(String(r.id||''));
    const tds=cols.map(c=>{
      let v=r[c[0]];
      if(c[2]==='bool')v=v?'Sì':'No';
      return `<td>${(v===null||v===undefined||v==='')?'<span style="color:var(--text-3)">—</span>':esc(String(v))}</td>`;
    }).join('');
    const del=id?`<button class="btn ghost sm" title="Elimina" onclick="${delFn}('${id}')" style="color:var(--red)">${icon('warn')}</button>`:'';
    return `<tr>${tds}<td style="text-align:right;white-space:nowrap">${del}</td></tr>`;
  }).join('');
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
async function segFiscalLoad(listId,rpcName,args,cols,delFn){
  const el=document.getElementById(listId);if(!el)return;
  el.innerHTML='<div class="empty">Caricamento…</div>';
  try{
    const data=await rpc(rpcName,args||{});
    const rows=Array.isArray(data)?data:(data?[data]:[]);
    el.innerHTML=segTable(rows,cols,delFn);
  }catch(e){
    el.innerHTML=`<div class="empty">${esc(segPermErr(e))}</div>`;
  }
}
async function segFiscalDelete(rpcName,id,reloadFn){
  if(!id)return;
  if(!confirm('Eliminare questo record? L\'operazione non è reversibile.'))return;
  try{ await rpc(rpcName,{p_id:id}); toast('Eliminato'); reloadFn(); }
  catch(e){ toast(segPermErr(e)); }
}
async function segFiscalCreate(rpcName,args,listId,reloadFn){
  const msg=document.getElementById(listId+'_msg');
  try{
    if(msg){msg.style.color='var(--text-3)';msg.textContent='Salvataggio…';}
    await rpc(rpcName,args);
    toast('Creato'); if(msg)msg.textContent=''; reloadFn();
  }catch(e){
    const m=segPermErr(e); if(msg){msg.style.color='var(--red)';msg.textContent=m;} toast(m);
  }
}
