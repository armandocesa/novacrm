/* Helper numerici condivisi per i calcolatori client-side. */
function segNum(id){const n=parseFloat(String(gv(id)).replace(/\./g,'').replace(',','.'));return Number.isFinite(n)?n:0;}
function segChecked(id){const e=document.getElementById(id);return !!(e&&e.checked);}
function segEur(n){if(!Number.isFinite(n))return '€0,00';return '€'+n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function segPct(n){if(!Number.isFinite(n))return '0%';return n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})+'%';}
function segResult(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}
/* Calcolo IRPEF lorda secondo gli scaglioni 2024 (3 aliquote). */
function segIrpefLorda(imponibile){
  const x=Math.max(0,imponibile||0);
  let t=0;
  t+=Math.min(x,28000)*0.23;
  if(x>28000)t+=(Math.min(x,50000)-28000)*0.35;
  if(x>50000)t+=(x-50000)*0.43;
  return t;
}

window.segLoadPanoramica=async function(){
  const list=document.getElementById('segPanoList');
  try{
    const data=await rpc('seg_deadlines_list',{p_status:null});
    let items=Array.isArray(data)?data:(data?[data]:[]);
    const open=items.filter(x=>x.status!=='done');
    let over=0,soon=0,done=items.length-open.length;
    open.forEach(it=>{const dl=segDaysLeft(it.due_date);if(dl!==null&&dl<0)over++;else if(dl!==null&&dl<=30)soon++;});
    const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=String(v);};
    set('segKpiOpen',open.length);set('segKpiOver',over);set('segKpiSoon',soon);set('segKpiDone',done);
    if(!list)return;
    const upcoming=open.slice().sort((a,b)=>String(a.due_date||'').localeCompare(String(b.due_date||''))).slice(0,8);
    if(!upcoming.length){list.innerHTML='<div class="empty">Nessuna scadenza aperta.</div>';return;}
    list.innerHTML='<div class="actlist">'+upcoming.map(it=>`<div class="actrow"><span class="dot" style="background:var(--primary)"></span><div><div class="t">${esc(it.title||'—')}</div><div class="s">${it.category?esc(it.category):'Generale'} · ${esc(it.due_date||'—')}</div></div><div style="margin-left:auto">${segDueBadge(it.due_date,it.status)}</div></div>`).join('')+'</div>';
  }catch(e){
    if(list)list.innerHTML=`<div class="empty">${esc(segPermErr(e))}</div>`;
  }
};

function segCalcRavvedimento(){
  const imp=segNum('rav_imp'),gg=Math.max(0,Math.round(segNum('rav_gg'))),tasso=segNum('rav_tasso');
  let aliq=0,lbl='';
  if(gg<=0){aliq=0;lbl='Nessun ritardo';}
  else if(gg<=14){aliq=0.001*gg;lbl='Sprint: 0,1% per giorno ('+gg+'gg)';}
  else if(gg<=30){aliq=0.015;lbl='Entro 30 giorni: 1,5%';}
  else if(gg<=90){aliq=0.0167;lbl='Entro 90 giorni: 1,67%';}
  else if(gg<=365){aliq=0.0375;lbl='Entro l\'anno: 3,75%';}
  else{aliq=0.0429;lbl='Oltre l\'anno: 4,29%';}
  const sanzione=imp*aliq;
  const interessi=imp*(tasso/100)*(gg/365);
  const tot=imp+sanzione+interessi;
  segResult('rav_out',`<div class="callout"><div>
    <div style="display:flex;justify-content:space-between"><span>Scaglione</span><span class="pill amb" style="font-size:11px">${esc(lbl)}</span></div>

    <div style="display:flex;justify-content:space-between"><span>Interessi legali (${segPct(tasso)} × ${gg}gg)</span><b>${segEur(interessi)}</b></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px"><span>Totale da versare</span><b style="color:var(--primary)">${segEur(tot)}</b></div>
  </div></div>`);
}

/* Helper: vista lista + form "nuovo" per un modulo CRM.

function modShellForm(cfg){
  const form=cfg.fields.map(f=>{

    </div>
  </div>`;

/* Carica una RPC di lista e renderizza le colonne richieste. cols=[[key,label,fmt?]]
   Se delFn è passato, aggiunge una colonna Azioni con il pulsante Elimina per riga. */
async function modList(listId,rpcName,args,cols,delFn){
  const el=document.getElementById(listId);if(!el)return;
  el.innerHTML='<div class="empty">Caricamento…</div>';
  try{
    const data=await rpc(rpcName,args||{});
    const rows=Array.isArray(data)?data:(data?[data]:[]);
    if(!rows.length){el.innerHTML='<div class="empty">Nessun record.</div>';return;}
    const head=cols.map(c=>`<th>${esc(c[1])}</th>`).join('')+(delFn?'<th style="text-align:right">Azioni</th>':'');
    const body=rows.map(r=>{
      const tds=cols.map(c=>{
        let v=r[c[0]];
        if(c[2]==='bool')v=v?'Attivo':'Inattivo';
        else if(c[2]==='date'&&v){const dt=new Date(v);if(!isNaN(dt))v=dt.toLocaleDateString('it-IT');}
        return `<td>${(v===null||v===undefined||v==='')?'<span style="color:var(--text-3)">—</span>':esc(String(v))}</td>`;
      }).join('');
      let act='';
      if(delFn){
        const id=esc(String(r.id||''));
        const del=id?`<button class="btn ghost sm" title="Elimina" onclick="${delFn}('${id}')" style="color:var(--red)">${icon('warn')}</button>`:'';
        act=`<td style="text-align:right;white-space:nowrap">${del}</td>`;
      }
      return `<tr>${tds}${act}</tr>`;
    }).join('');
    el.innerHTML=`<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  }catch(e){
    el.innerHTML=`<div class="empty">${esc(segPermErr(e))}</div>`+note('La lista non è al momento disponibile.');
  }
}
/* Create/Delete generici per i moduli CRM (riusano segPermErr per il messaggio). */
async function modCreate(rpcName,args,listId,reloadFn){
  const msg=document.getElementById(listId+'_msg');
  try{
    if(msg){msg.style.color='var(--text-3)';msg.textContent='Salvataggio…';}
    await rpc(rpcName,args);
    toast('Creato'); if(msg)msg.textContent=''; reloadFn();
  }catch(e){
    const m=segPermErr(e); if(msg){msg.style.color='var(--red)';msg.textContent=m;} toast(m);
  }
}
async function modDelete(rpcName,id,reloadFn){
  if(!id)return;
  if(!confirm('Eliminare questo record? L\'operazione non è reversibile.'))return;
  try{ await rpc(rpcName,{p_id:id}); toast('Eliminato'); reloadFn(); }
  catch(e){ toast(segPermErr(e)); }
}
function modFormErr(listId,text){const m=document.getElementById(listId+'_msg');if(m){m.style.color='var(--red)';m.textContent=text;}}
function modNum(v){const n=parseFloat(v);return Number.isFinite(n)?n:null;}
function modInt(v){const n=parseInt(v,10);return Number.isFinite(n)?n:null;}

async function calLoadEventi(){

  try{
    const data=await rpc('crm_calendar_list',{});

    if(!rows.length){el.innerHTML='<div class="empty">Nessun evento.</div>';return;}
    const cols=[['title','Titolo'],['start_at','Inizio','date'],['end_at','Fine','date'],['location','Luogo']];
    const head=cols.map(c=>`<th>${esc(c[1])}</th>`).join('');

    el.innerHTML=`<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  }catch(e){
    // Se la RPC di lista non esiste ancora nel DB, mostra un empty pulito invece di un errore.

async function calCreateMeeting(){
  const msg=document.getElementById('mLCalVid_msg');

const EN={commodity:'ele', last:null, draft:null, view:'analisi', acts:[], sup:[]};

const EN_ST_KEYS=['draft','ready','sent','accepted','switching','active','rejected','cancelled'];
function enEur(n){try{return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);}catch(e){return '€'+Math.round(n||0);}}
function enSetComm(x){EN.commodity=x;render('mod_energia');}
function enSetView(v){EN.view=v;render('mod_energia');}
function enFileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const s=String(r.result);res(s.slice(s.indexOf(',')+1));};r.onerror=rej;r.readAsDataURL(file);});}
async function enExtract(file){
  if(!file)return;
  const msg=document.getElementById('en_extract_msg');
  if(file.size>20*1024*1024){if(msg){msg.style.color='var(--red)';msg.textContent='File troppo grande (max ~20 MB).';}return;}
  if(msg){msg.style.color='var(--text-3)';msg.textContent='Lettura della bolletta in corso… (può richiedere qualche secondo)';}
  try{
    const data=await enFileToB64(file);
    const res=await edgeFn('bill-extract',{mime:file.type||'application/octet-stream',data,filename:file.name});
    EN.draft={
      period_start:res.period_start||null, period_end:res.period_end||null,
      consumption_total:(res.consumption_total??null), current_unit_price:(res.current_unit_price??null),
      current_fixed_fee_year:(res.current_fixed_fee_year??null), postal_code:res.postal_code||null,
      supplier:res.supplier||null, customer_name:res.customer_name||null, address:res.address||null,
      pod:res.pod||null, pdr:res.pdr||null, fiscal_code:res.fiscal_code||null
    };
    if(res.commodity==='ele'||res.commodity==='gas')EN.commodity=res.commodity;
    render('mod_energia');
    const conf=(typeof res.confidence==='number')?(' · affidabilità '+Math.round(res.confidence*100)+'%'):'';
    toast('Dati estratti dalla bolletta'+conf+' — controlla e premi Analizza');
  }catch(e){
    const m=(e&&e.message?e.message:String(e));
    if(/501|configur|ANTHROPIC|not.?ready|non.?disponibil/i.test(m)){
      if(msg){msg.style.color='var(--amber)';msg.textContent='Estrazione automatica non ancora attiva (manca la API key Anthropic). Inserisci i dati a mano qui sotto.';}
    }else{
      if(msg){msg.style.color='var(--red)';msg.textContent='Non sono riuscito a leggere la bolletta ('+m+'). Inserisci i dati a mano.';}
    }
  }
}

async function enAnalyze(){
  const msg=document.getElementById('en_msg');

  const d=EN.draft||{};
  const p={commodity:EN.commodity, consumption_total:cons, current_unit_price:price,
    current_fixed_fee_year:parseFloat(gv('en_fee'))||0,
    period_start:gv('en_ps')||null, period_end:gv('en_pe')||null, postal_code:gv('en_cap')||null,
    current_supplier:gv('en_supplier')||null, address:d.address||null, fiscal_code:gv('en_cf')||null,

    customer_name:gv('en_name')||null, email:gv('en_email')||null, phone:gv('en_phone')||null};

  try{

function enConfronto(){
  const d=EN.last;
  if(!d||!d.proposals||!d.proposals.length){
    return note('<b>Confronto costi fornitori.</b> Esegui prima un’analisi nella scheda “Analisi bolletta”: qui comparirà il confronto completo tra tutti i fornitori, con grafico.');
  }
  const unit=EN.commodity==='gas'?'Smc':'kWh';
  const cur=d.proposals[0].annual_cost_current;
  const best=d.proposals[0];
  const maxv=Math.max(cur, ...d.proposals.map(p=>p.annual_cost_offer))||1;
  const bar=(cost,color)=>`<div style="background:var(--surface-3);border-radius:6px;height:20px;width:100%"><div style="width:${Math.max(3,Math.round(cost/maxv*100))}%;height:100%;background:${color};border-radius:6px"></div></div>`;

  rows+=d.proposals.map(p=>{
    const col=p.is_recommended?'var(--green)':'var(--primary)';
    return `<tr ${p.is_recommended?'style="background:var(--green-soft)"':''}>
      <td style="white-space:nowrap"><b>${esc(p.supplier_name)}</b> ${p.is_recommended?'<span class="pill cli" style="font-size:11px">Consigliata</span>':''}<div style="color:var(--text-3);font-size:12px">${esc(p.offer_name)} · ${p.price_type==='fixed'?'fisso':'indicizzata'}</div></td>
      <td>${bar(p.annual_cost_offer,col)}</td>
      <td style="text-align:right;font-weight:600">${enEur(p.annual_cost_offer)}/anno</td>
      <td style="text-align:right;color:var(--green);font-weight:700">−${enEur(p.annual_saving)}</td>
    </tr>`;
  }).join('');
  return note(`<b>Confronto costi fornitori.</b> Consumo annuo stimato <b>${d.annual_consumption} ${unit}</b>. Spesa attuale <b>${enEur(cur)}/anno</b>. Migliore: <b>${esc(best.supplier_name)}</b> a ${enEur(best.annual_cost_offer)}/anno (risparmio ${enEur(best.annual_saving)}).`)+

}

/* --- Matrice moduli per tenant (superadmin) --- */
async function saLoadModules(){
  const wrap=document.getElementById('saModWrap');if(!wrap)return;
  wrap.innerHTML='<div class="callout">Caricamento…</div>';
  try{
    const data=await rpc('crm_admin_list_modules',{});
    const rows=Array.isArray(data)?data:(data?[data]:[]);
    if(!rows.length){wrap.innerHTML='<div class="callout">Nessun dato sui moduli.</div>';return;}
    // Raggruppa per org: { org_id, org_name, mods:{module:enabled} }
    const orgs=new Map();
    rows.forEach(r=>{
      const id=String(r.org_id??'');
      if(!orgs.has(id))orgs.set(id,{id,name:String(r.org_name??r.org_id??''),mods:{}});
      orgs.get(id).mods[r.module]=!!r.enabled;
    });
    const list=[...orgs.values()].sort((a,b)=>a.name.localeCompare(b.name));
    const head=`<tr><th>Organizzazione</th>${MODULES.map(m=>`<th style="text-align:center">${esc(m.label)}</th>`).join('')}</tr>`;
    const body=list.map(o=>{
      const cells=MODULE_ORDER.map(k=>{
        const on=!!o.mods[k];
        return `<td><div style="display:flex;justify-content:center"><div class="toggle ${on?'':'off'}" data-mod-org="${esc(o.id)}" data-mod-key="${esc(k)}" data-mod-on="${on?'1':'0'}" title="${on?'Disattiva':'Attiva'} ${esc(MODULE_LABEL[k]||k)}"></div></div></td>`;
      }).join('');
      return `<tr><td><b>${esc(o.name)}</b><div style="font-size:11px;color:var(--text-3);font-family:monospace">${esc(o.id)}</div></td>${cells}</tr>`;
    }).join('');
    wrap.innerHTML=`<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    wrap.querySelectorAll('[data-mod-org]').forEach(el=>el.addEventListener('click',()=>saToggleModule(el)));
  }catch(err){
    wrap.innerHTML=`<div class="callout sa-err">${esc(err&&err.message?err.message:String(err))}</div>`;
  }
}
async function saToggleModule(el){
  const org=el.getAttribute('data-mod-org');
  const key=el.getAttribute('data-mod-key');
  const cur=el.getAttribute('data-mod-on')==='1';
  const box=document.getElementById('saModMsg');if(box)box.innerHTML='';
  // Feedback ottimistico
  el.classList.toggle('off',cur);
  try{
    await rpc('crm_admin_set_module',{p_org:org,p_module:key,p_enabled:!cur});
    toast((!cur?'Attivato':'Disattivato')+': '+(MODULE_LABEL[key]||key));
    await saLoadModules();
  }catch(err){
    el.classList.toggle('off',!cur); // ripristina
    if(box)box.innerHTML=`<div class="callout sa-err">${esc(err&&err.message?err.message:String(err))}</div>`;
    toast('Errore: '+(err&&err.message?err.message:String(err)));
  }
}
async function saLoadOrgs(){const wrap=document.getElementById('saOrgsWrap');if(!wrap)return;wrap.innerHTML='<div class="callout">Caricamento…</div>';try{const data=await rpc('crm_admin_list_orgs',{});const orgs=Array.isArray(data)?data:(data?[data]:[]);if(!orgs.length){wrap.innerHTML='<div class="callout">Nessuna organizzazione.</div>';return;}const rows=orgs.map(o=>`<tr><td><span class="pill">${esc(String(o.id??''))}</span></td><td>${esc(String(o.name??o.id??''))}</td><td>${o.members!==undefined?esc(String(o.members)):'—'}</td></tr>`).join('');wrap.innerHTML=`<table><thead><tr><th>ID</th><th>Nome</th><th>Membri</th></tr></thead><tbody>${rows}</tbody></table>`;}catch(err){wrap.innerHTML=`<div class="callout sa-err">${esc(err&&err.message?err.message:String(err))}</div>`;}}
async function saSetMember(){const box=document.getElementById('saMemMsg');const email=(document.getElementById('saMemEmail').value||'').trim();const org=(document.getElementById('saMemOrg').value||'').trim();const role=(document.getElementById('saMemRole').value||'').trim();box.innerHTML='';if(!email||!org||!role){box.innerHTML='<div class="callout sa-err">Compila email, organizzazione e ruolo.</div>';return;}try{const res=await rpc('crm_admin_set_member',{p_email:email,p_org:org,p_role:role});box.innerHTML=`<div class="callout sa-ok">${esc(res==null?'Completato.':String(res))}</div>`;toast('Membro aggiornato');}catch(err){box.innerHTML=`<div class="callout sa-err">${esc(err&&err.message?err.message:String(err))}</div>`;}}
async function saLinkClient(){const box=document.getElementById('saLinkMsg');const email=(document.getElementById('saLinkEmail').value||'').trim();const code=(document.getElementById('saLinkCode').value||'').trim();box.innerHTML='';if(!email||!code){box.innerHTML='<div class="callout sa-err">Compila email e codice cliente.</div>';return;}try{const res=await rpc('admin_link_client',{p_email:email,p_client_code:code});box.innerHTML=`<div class="callout sa-ok">${esc(res==null?'Completato.':String(res))}</div>`;toast('Cliente collegato');}catch(err){box.innerHTML=`<div class="callout sa-err">${esc(err&&err.message?err.message:String(err))}</div>`;}}

/* ---------- ORGANIZZAZIONE (sotto-aree) ---------- */
const orgF={area:null,mktg:null};
function orgLbl(v){return v||'Non assegnato';}
function orgByArea(){const m=new Map();DATA.contatti.forEach(c=>{const k=orgLbl(c.area);if(!m.has(k))m.set(k,{nome:k,count:0,val:0});const o=m.get(k);o.count++;o.val+=(+c.val||0);});return [...m.values()].sort((a,b)=>b.val-a.val);}
function orgByMktg(){const m=new Map();DATA.contatti.forEach(c=>{const k=orgLbl(c.mktg);if(!m.has(k))m.set(k,{nome:k,count:0,val:0});const o=m.get(k);o.count++;o.val+=(+c.val||0);});return [...m.values()].sort((a,b)=>b.count-a.count);}
function orgPipeByArea(){const m=new Map();DATA.deals.forEach(d=>{const k=orgLbl(d.area);if(!m.has(k))m.set(k,{nome:k,count:0,val:0});const o=m.get(k);o.count++;o.val+=(+d.val||0);});return [...m.values()].sort((a,b)=>b.val-a.val);}
function orgFiltered(){return DATA.contatti.filter(c=>{if(orgF.area!==null&&orgLbl(c.area)!==orgF.area)return false;if(orgF.mktg!==null&&orgLbl(c.mktg)!==orgF.mktg)return false;return true;});}
const ORG_PILLS=['blu','grn','amb','pur','cold','plain'];
function orgPillCls(i){return ORG_PILLS[i%ORG_PILLS.length];}
function vOrg(){const areas=orgByArea(),mktg=orgByMktg(),pipe=orgPipeByArea();const totContatti=DATA.contatti.length;const totVal=DATA.contatti.reduce((s,c)=>s+(+c.val||0),0);
  let kpis=`<div class="kpis"><div class="card kpi"><small>${icon('grid')} Totale workspace</small><div class="v">${esc(String(totContatti))}</div><div class="d">${eur(totVal)} di valore</div></div>`;
  areas.forEach(a=>{kpis+=`<div class="card kpi"><small>${icon('building')} ${esc(a.nome)}</small><div class="v">${esc(String(a.count))}</div><div class="d">${eur(a.val)} · contatti</div></div>`;});kpis+=`</div>`;
  const maxMk=Math.max(1,...mktg.map(x=>x.count));let mkBars=`<div class="card"><h3>${icon('share')} Distribuzione per approccio marketing</h3><div class="org-bars">`;mktg.forEach((x,i)=>{const pct=Math.round((x.count/maxMk)*100);mkBars+=`<div class="org-bar"><div class="lbl">${esc(x.nome)}</div><div class="trk"><div class="fill ${orgPillCls(i)}" style="width:${pct}%"></div></div><div class="num">${esc(String(x.count))} · ${eur(x.val)}</div></div>`;});mkBars+=`</div></div>`;
  const maxPipe=Math.max(1,...pipe.map(x=>x.val));const totPipe=pipe.reduce((s,x)=>s+x.val,0);let pipeCard=`<div class="card"><h3>${icon('chart')} Pipeline per area di business</h3><div style="color:var(--text-3);font-size:12px;margin-bottom:12px">${eur(totPipe)} su ${esc(String(DATA.deals.length))} trattative</div><div class="actlist">`;pipe.forEach((x,i)=>{const pct=Math.round((x.val/maxPipe)*100);pipeCard+=`<div style="padding:9px 4px;border-bottom:1px solid var(--border-2)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="pill ${orgPillCls(i)}">${esc(x.nome)}</span><strong>${eur(x.val)} <span style="color:var(--text-3);font-weight:400">(${esc(String(x.count))})</span></strong></div><div class="progress"><i style="width:${pct}%"></i></div></div>`;});pipeCard+=`</div></div>`;
  const fc=orgFiltered();const areaNames=areas.map(a=>a.nome),mktgNames=mktg.map(m=>m.nome);
  let chipsArea=`<span class="org-chip ${orgF.area===null?'on':''}" data-org-area="">Tutte le aree</span>`+areaNames.map(n=>`<span class="org-chip ${orgF.area===n?'on':''}" data-org-area="${esc(n)}">${esc(n)}</span>`).join('');
  let chipsMk=`<span class="org-chip ${orgF.mktg===null?'on':''}" data-org-mktg="">Tutti gli approcci</span>`+mktgNames.map(n=>`<span class="org-chip ${orgF.mktg===n?'on':''}" data-org-mktg="${esc(n)}">${esc(n)}</span>`).join('');
  let rows='';if(fc.length===0){rows=`<tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:24px">Nessun contatto per i filtri selezionati.</td></tr>`;}else{fc.forEach(c=>{rows+=`<tr><td><div style="display:flex;align-items:center;gap:8px"><span class="miniav" style="background:${ci(c.n)}">${esc(initials(c.n))}</span><div><div>${esc(c.n)}</div><div style="font-size:12px;color:var(--text-3)">${esc(c.ruolo||'')}</div></div></div></td><td>${esc(c.az||'')}</td><td><span class="pill plain">${esc(orgLbl(c.area))}</span></td><td><span class="pill cold">${esc(orgLbl(c.mktg))}</span></td><td>${esc(c.stato||'')}</td><td style="text-align:right">${eur(+c.val||0)}</td></tr>`;});}
  const tbl=`<div class="card"><h3>${icon('users')} Contatti per area</h3><div class="org-filterbar"><div class="org-chiprow"><span class="org-chiplbl">${icon('building')} Business</span>${chipsArea}</div><div class="org-chiprow"><span class="org-chiplbl">${icon('share')} Marketing</span>${chipsMk}</div></div><div style="color:var(--text-3);font-size:12px;margin:6px 0 10px">${esc(String(fc.length))} contatti${(orgF.area||orgF.mktg)?' (filtrati)':''}</div><div class="tablecard"><table><thead><tr><th>Contatto</th><th>Azienda</th><th>Area business</th><th>Marketing</th><th>Stato</th><th style="text-align:right">Valore</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  return `${kpis}<div class="grid2">${mkBars}${pipeCard}</div>${tbl}`;}
window.wireOrg=function(){document.querySelectorAll('[data-org-area]').forEach(el=>el.addEventListener('click',()=>{const v=el.getAttribute('data-org-area');orgF.area=(v==='')?null:v;render('organizzazione');}));document.querySelectorAll('[data-org-mktg]').forEach(el=>el.addEventListener('click',()=>{const v=el.getAttribute('data-org-mktg');orgF.mktg=(v==='')?null:v;render('organizzazione');}));};

(function boot(){
  const hp=new URLSearchParams(location.hash.slice(1));
  if(hp.get('access_token')){token=hp.get('access_token');mode='auth';localStorage.setItem('nova_token',token);const em=emailFromJwt(token);if(em)localStorage.setItem('nova_email',em);history.replaceState(null,'',location.pathname+location.search);startApp();return;}
  const saved=localStorage.getItem('nova_token');
  if(saved){token=saved;mode='auth';startApp();}else{showLogin();}
})();
</script>
